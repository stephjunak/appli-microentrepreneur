  const [urssafHistory, setUrssafHistory] = React.useState(() => load("mef2:urssaf_history", {
    "BIC_VENTE":  [{ from: "2026-01-01", social: 0.123, lib: 0.010 }],
    "BIC_PRESTA": [{ from: "2026-01-01", social: 0.212, lib: 0.017 }],
    "BNC":        [{ from: "2026-01-01", social: 0.261, lib: 0.022 }],
    "BNC_CIPAV":  [{ from: "2026-01-01", social: 0.232, lib: 0.022 }],
  }));
  const [tvaConfig, setTvaConfig] = React.useState(() => load("mef2:tva_config", [
    { v: 0,    label: "0 %" },
    { v: 0.10, label: "10 %" },
    { v: 0.20, label: "20 %" },
  ]));

  React.useEffect(() => save("mef2:profile", profile), [profile]);
  React.useEffect(() => save("mef2:factures", facturesByMonth), [facturesByMonth]);
  React.useEffect(() => save("mef2:charges", charges), [charges]);
  React.useEffect(() => save("mef2:ui", ui), [ui]);
  React.useEffect(() => save("mef2:urssaf_history", urssafHistory), [urssafHistory]);
  React.useEffect(() => save("mef2:tva_config", tvaConfig), [tvaConfig]);

  const DEFAULT_CATEGORIES = ["Charges de fonctionnement", "Abonnements", "Achats ponctuels"];
  const [categories, setCategories] = React.useState(() => load("mef2:categories", DEFAULT_CATEGORIES));
  React.useEffect(() => save("mef2:categories", categories), [categories]);
  const addCategory = (name) => { const n = name.trim(); if (n && !categories.includes(n)) setCategories(c => [...c, n]); };
  const removeCategory = (name) => {
    if (categories.length <= 1) return;
    const fallback = categories.find(c => c !== name) || "";
    setCategories(c => c.filter(x => x !== name));
    setCharges(prev => prev.map(ch => ch.categorie === name ? { ...ch, categorie: fallback } : ch));
  };

  const m = ui.month;
  const key = monthKey(m);
  const factures = facturesByMonth[key] || [];
  const setList = (list) => setFB((p) => ({ ...p, [key]: list }));

  // ----- factures (invoices w/ lines) -----
  const removeInv = (id) => setList(factures.filter((f) => f.id !== id));
  // Enregistre une facture (création ou modification) dans le bucket du mois de sa date.
  // Gère le changement de mois : la facture est retirée de tout autre bucket.
  const saveInv = (inv) => setFB((p) => {
    const targetKey = (inv.date && inv.date.slice(0, 7)) || key;
    const next = {};
    for (const k of Object.keys(p)) next[k] = (p[k] || []).filter((f) => f.id !== inv.id);
    const existedHere = (p[targetKey] || []).some((f) => f.id === inv.id);
    next[targetKey] = existedHere
      ? (p[targetKey] || []).map((f) => (f.id === inv.id ? inv : f))
      : [...(next[targetKey] || []), inv];
    return next;
  });

  // ----- frais (charges récurrentes, liste globale) -----
  const addCharge = (cat, libelle, ponctuel) => {
    const from = TODAY;
    const jourFromDate = parseInt(from.slice(8, 10), 10) || 1;
    setCharges(prev => [...prev, { id: uid(), libelle: libelle || "", montant: "", categorie: cat || categories[0] || "", tarifsHistory: [{ montant: "", from }], frequence: ponctuel ? "ponctuelle" : "mensuelle", jour: jourFromDate, date: from, tva: 0 }]);
  };
  const addChargeFull = (charge) => setCharges(prev => [...prev, charge]);
  const updateCharge = (id, field, val) => setCharges(prev => prev.map((c) => {
    if (c.id !== id) return c;
    const updated = { ...c, [field]: val };
    if (field === "date" && updated.tarifsHistory && updated.tarifsHistory.length > 0) {
      updated.jour = parseInt(val.slice(8, 10), 10) || 1;
      const hist = updated.tarifsHistory.slice().sort((a, b) => a.from < b.from ? -1 : 1);
      hist[0] = { ...hist[0], from: val };
      updated.tarifsHistory = hist;
    }
    return updated;
  }));
  const removeCharge = (id) => setCharges(charges.filter((c) => c.id !== id));
  const addTariff = (id, from, montant) => setCharges(charges.map(c => c.id === id
    ? { ...c, tarifsHistory: [...(c.tarifsHistory || []).filter(t => t.from !== from), { from, montant }].sort((a, b) => a.from < b.from ? -1 : 1) }
    : c));
  const removeTariff = (id, from) => setCharges(charges.map(c => c.id === id
    ? { ...c, tarifsHistory: (c.tarifsHistory || []).filter(t => t.from !== from) }
    : c));

  // ----- solde de trésorerie au 1er du mois (saisi, par mois) -----
  const [soldes, setSoldes] = React.useState(() => load("mef2:soldes", {}));
  React.useEffect(() => save("mef2:soldes", soldes), [soldes]);
  const setSolde = (val) => setSoldes((p) => ({ ...p, [key]: val }));

  // ----- CFE -----
  const [cfeData, setCfeData] = React.useState(() => load("mef2:cfe", {}));
  React.useEffect(() => save("mef2:cfe", cfeData), [cfeData]);
  const updateCfe = (field, val) => setCfeData(prev => ({ ...prev, [YEAR]: { ...(prev[YEAR] || {}), [field]: val } }));
  const cfeAnnuel = num((cfeData[YEAR] || {}).montant) || 0;

  // ----- nav -----
  const goMonth = (delta) => setUi((u) => ({ ...u, month: Math.min(11, Math.max(0, u.month + delta)) }));
  const setTab = (tab) => setUi((u) => ({ ...u, tab }));

  // ----- export / import -----
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ version: 2, profile, facturesByMonth, charges, cfe: cfeData, soldes, urssafHistory, tvaConfig }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `microcompte-${YEAR}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d.profile) setProfile(d.profile);
        if (d.facturesByMonth) setFB(d.facturesByMonth);
        if (d.charges) setCharges(d.charges);
        if (d.cfe) setCfeData(d.cfe);
        if (d.soldes) setSoldes(d.soldes);
        if (d.urssafHistory) setUrssafHistory(d.urssafHistory);
        if (d.tvaConfig) setTvaConfig(d.tvaConfig);
        alert("Données importées avec succès.");
      } catch (err) { alert("Fichier invalide."); }
    };
    r.readAsText(file);
    e.target.value = "";
  };

  const initiales = (profile.nom || "ME").trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase() || "ME";

  const TABS = [
    ["dashboard",   "Tableau de bord",                TabIcon.dashboard],
    ["factures",    "Factures",                       TabIcon.factures],
    ["frais",       "Frais et achats",                TabIcon.frais],
    ["prov",        "Impôts & déclarations mensuelles", TabIcon.prov],
    ["calendrier",  "Calendrier",                     TabIcon.calendrier],
  ];

  return (
    <div className="app">
      <div className="appbar">
        <div className="logo">
          <div className="mk">€</div>
          <div>
            <div className="nm">MicroCompte</div>
            <div className="yr">Micro-entreprise · {YEAR} · v2</div>
          </div>
        </div>
        <div className="spacer"></div>
        <button className="who" onClick={() => setProfileOpen(true)}>
          <span className="ava">{initiales}</span>
          {profile.nom || "Mon profil"}
          <svg className="gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/></svg>
        </button>
      </div>

      <div className="tabs">
        {TABS.map(([k, lab, ic]) => (
          <button key={k} className={"tab" + (ui.tab === k ? " on" : "")} onClick={() => setTab(k)}>{ic} {lab}</button>
        ))}
      </div>

      <div className="monthnav">
        <button className="mbtn" disabled={m === 0} onClick={() => goMonth(-1)}>{Chev("M15 18l-6-6 6-6")}</button>
        <div className="mlabel">{MONTHS[m]} {YEAR}</div>
        <button className="mbtn" disabled={m === 11} onClick={() => goMonth(1)}>{Chev("M9 18l6-6-6-6")}</button>
      </div>

      {ui.tab === "dashboard" && <DashboardTab facturesByMonth={facturesByMonth} factures={factures} charges={charges} profile={profile} mIndex={m} cfeAnnuel={cfeAnnuel} urssafHistory={urssafHistory} soldeDebut={soldes[key]} onSetSolde={setSolde} />}
      {ui.tab === "factures" && <FacturesTab factures={factures} facturesByMonth={facturesByMonth} charges={charges} profile={profile} mIndex={m}
        onSaveInv={saveInv} onRemoveInv={removeInv} urssafHistory={urssafHistory} tvaConfig={tvaConfig} />}
      {ui.tab === "frais" && <FraisTab charges={charges} mIndex={m} categories={categories} profile={profile} onAdd={addCharge} onCreate={addChargeFull} onUpdate={updateCharge} onRemove={removeCharge} onAddTariff={addTariff} onRemoveTariff={removeTariff} onAddCategory={addCategory} onRemoveCategory={removeCategory} tvaConfig={tvaConfig} />}
      {ui.tab === "prov" && <ChargesProvisionsTab factures={factures} facturesByMonth={facturesByMonth} charges={charges} profile={profile} mIndex={m} cfeData={cfeData[YEAR] || {}} onUpdateCfe={updateCfe} urssafHistory={urssafHistory} />}
      {ui.tab === "calendrier" && <CalendarTab mIndex={m} charges={charges} profile={profile} cfeAnnuel={cfeAnnuel} facturesByMonth={facturesByMonth} urssafHistory={urssafHistory} />}

      {profileOpen && <ProfileModal profile={profile} setProfile={setProfile} onClose={() => setProfileOpen(false)} onExport={exportJSON} onImport={importJSON} urssafHistory={urssafHistory} setUrssafHistory={setUrssafHistory} tvaConfig={tvaConfig} setTvaConfig={setTvaConfig} />}
    </div>
  );
}

function ProfileModal({ profile, setProfile, onClose, onExport, onImport, urssafHistory, setUrssafHistory, tvaConfig, setTvaConfig }) {
  const up = (field, val) => setProfile({ ...profile, [field]: val });
  const prev = (profile.prevYears || {})[YEAR - 1] || {};
  const upPrev = (field, val) => setProfile(p => ({
    ...p,
    prevYears: { ...(p.prevYears || {}), [YEAR - 1]: { ...((p.prevYears || {})[YEAR - 1] || {}), [field]: num(val) } }
  }));
  const fileRef = React.useRef(null);

  const [addingUrssaf, setAddingUrssaf] = React.useState(false);
  const [urssafForm, setUrssafForm] = React.useState({
    from: `${YEAR + 1}-01-01`,
    rates: Object.fromEntries(CATS_META.map(m => [m.key, { social: "", lib: "" }])),
  });
  const [showUrssafHistory, setShowUrssafHistory] = React.useState(false);
  const currentRateFor = (cat) => {
    const hist = ((urssafHistory || {})[cat] || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
    return hist.length > 0 ? hist[hist.length - 1] : null;
  };
  const saveUrssafEntry = () => {
    const newHistory = { ...(urssafHistory || {}) };
    CATS_META.forEach(m => {
      const s = parseFloat(urssafForm.rates[m.key].social) / 100;
      const l = parseFloat(urssafForm.rates[m.key].lib) / 100;
      if (!isNaN(s) && s > 0) {
        const existing = (newHistory[m.key] || []).filter(e => e.from !== urssafForm.from);
        newHistory[m.key] = [...existing, { from: urssafForm.from, social: s, lib: isNaN(l) ? 0 : l }]
          .sort((a, b) => a.from < b.from ? -1 : 1);
      }
    });
    setUrssafHistory(newHistory);
    setAddingUrssaf(false);
    setUrssafForm({ from: `${YEAR + 1}-01-01`, rates: Object.fromEntries(CATS_META.map(m => [m.key, { social: "", lib: "" }])) });
  };
  const deleteUrssafEntry = (cat, from) => {
    const hist = ((urssafHistory || {})[cat] || []).filter(e => e.from !== from);
    setUrssafHistory({ ...(urssafHistory || {}), [cat]: hist });
  };
  const [addingTva, setAddingTva] = React.useState(false);
  const [newTvaValue, setNewTvaValue] = React.useState("");
  return (
    <div className="scrim" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-h">
          <h3>Profil &amp; paramètres</h3>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          <div className="field">
            <label>Nom du micro-entrepreneur</label>
            <input className="in" value={profile.nom} placeholder="Ex : Camille Martin" onChange={(e) => up("nom", e.target.value)} />
          </div>
          <div className="toggle-row">
            <div className="t-lab">Assujetti à la TVA<small>Affiche la colonne TVA et le suivi de TVA à reverser</small></div>
            <button className={"sw" + (profile.tva ? " on" : "")} onClick={() => up("tva", !profile.tva)}></button>
          </div>
          <div className="toggle-row">
            <div className="t-lab">Versement libératoire de l'impôt<small>Ajoute le taux libératoire aux cotisations URSSAF</small></div>
            <button className={"sw" + (profile.liberatoire ? " on" : "")} onClick={() => up("liberatoire", !profile.liberatoire)}></button>
          </div>
          <div className="toggle-row">
            <div className="t-lab">Année en cours<small>Données saisies pour {YEAR}</small></div>
            <b>{YEAR}</b>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Dates de prélèvement
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div className="field" style={{ marginBottom: 0 }}>
                <label>TVA</label>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>le</span>
                  <input className="in" type="number" min="1" max="28" style={{ maxWidth: 80 }}
                    value={profile.tvaJour === undefined ? 15 : profile.tvaJour} onChange={(e) => up("tvaJour", num(e.target.value) || "")} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>du mois +</span>
                  <input className="in" type="number" min="0" max="6" style={{ maxWidth: 70 }}
                    value={profile.tvaDecalage === undefined ? 1 : profile.tvaDecalage} onChange={(e) => up("tvaDecalage", e.target.value === "" ? "" : num(e.target.value))} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>mois</span>
                </div>
                <small style={{ color: "var(--faint)", display: "block", marginTop: 4 }}>Par défaut : le 15 du mois suivant (+1).</small>
              </div>
              <div className="field" style={{ marginBottom: 0 }}>
                <label>URSSAF</label>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>le</span>
                  <input className="in" type="number" min="1" max="28" style={{ maxWidth: 80 }}
                    value={profile.urssafJour === undefined ? 5 : profile.urssafJour} onChange={(e) => up("urssafJour", num(e.target.value) || "")} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>du mois +</span>
                  <input className="in" type="number" min="0" max="6" style={{ maxWidth: 70 }}
                    value={profile.urssafDecalage === undefined ? 2 : profile.urssafDecalage} onChange={(e) => up("urssafDecalage", e.target.value === "" ? "" : num(e.target.value))} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>mois</span>
                </div>
                <small style={{ color: "var(--faint)", display: "block", marginTop: 4 }}>Par défaut : le 5, 2 mois après (+2).</small>
              </div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Référence année précédente ({YEAR - 1})
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div className="field">
                <label>Revenu net {YEAR - 1} <span style={{ fontWeight: 400, color: "var(--faint)" }}>— pour la comparaison N-1 sur le tableau de bord</span></label>
                <input className="in" type="number" step="1" placeholder="Ex : 41200" value={prev.net || ""} onChange={e => upPrev("net", e.target.value)} />
              </div>
              <div className="field">
                <label>CA encaissé TTC {YEAR - 1}</label>
                <input className="in" type="number" step="1" placeholder="Ex : 71400" value={prev.caTTC || ""} onChange={e => upPrev("caTTC", e.target.value)} />
              </div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Taux officiels
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 8 }}>URSSAF · cotisations sociales</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                {CATS_META.map(m => {
                  const r = currentRateFor(m.key);
                  return r ? (
                    <div key={m.key} style={{ display: "flex", gap: 10, fontSize: 13, alignItems: "center" }}>
                      <span style={{ flex: 1, color: "var(--soft)" }}>{m.label}</span>
                      <span style={{ fontWeight: 600 }}>{pct(r.social)}</span>
                      {r.lib > 0 && <span style={{ color: "var(--faint)" }}>+ {pct(r.lib)} libér.</span>}
                      <span style={{ fontSize: 11, color: "var(--faint)" }}>depuis {new Date(r.from + "T00:00:00").toLocaleDateString("fr-FR")}</span>
                    </div>
                  ) : null;
                })}
              </div>

              {!addingUrssaf ? (
                <button className="btn" style={{ marginTop: 10, fontSize: 12.5 }} onClick={() => setAddingUrssaf(true)}>
                  + Nouveau taux
                </button>
              ) : (
                <div style={{ marginTop: 10, background: "var(--primary-soft)", borderRadius: 8, padding: 12 }}>
                  <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4 }}>À partir du</label>
                    <input type="date" className="in" value={urssafForm.from}
                      onChange={e => setUrssafForm(f => ({ ...f, from: e.target.value }))}
                      style={{ width: "auto" }} />
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 120px 120px", gap: "4px 10px", fontSize: 12, marginBottom: 8 }}>
                    <span style={{ fontWeight: 600, color: "var(--faint)", paddingBottom: 4 }}>Catégorie</span>
                    <span style={{ fontWeight: 600, color: "var(--faint)", textAlign: "right", paddingBottom: 4 }}>Taux social</span>
                    <span style={{ fontWeight: 600, color: "var(--faint)", textAlign: "right", paddingBottom: 4 }}>Taux libér.</span>
                    {CATS_META.map(m => (
                      <React.Fragment key={m.key}>
                        <span style={{ color: "var(--soft)", alignSelf: "center", paddingBottom: 4 }}>{m.label}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 3, justifyContent: "flex-end", paddingBottom: 4 }}>
                          <input type="number" step="0.1" min="0" max="100" className="in"
                            placeholder={((currentRateFor(m.key)?.social || 0) * 100).toFixed(1)}
                            value={urssafForm.rates[m.key].social}
                            onChange={e => setUrssafForm(f => ({ ...f, rates: { ...f.rates, [m.key]: { ...f.rates[m.key], social: e.target.value } } }))}
                            style={{ width: 64, textAlign: "right" }} />
                          <span style={{ fontSize: 11, color: "var(--faint)" }}>%</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 3, justifyContent: "flex-end", paddingBottom: 4 }}>
                          <input type="number" step="0.1" min="0" max="100" className="in"
                            placeholder={((currentRateFor(m.key)?.lib || 0) * 100).toFixed(1)}
                            value={urssafForm.rates[m.key].lib}
                            onChange={e => setUrssafForm(f => ({ ...f, rates: { ...f.rates, [m.key]: { ...f.rates[m.key], lib: e.target.value } } }))}
                            style={{ width: 64, textAlign: "right" }} />
                          <span style={{ fontSize: 11, color: "var(--faint)" }}>%</span>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn" onClick={() => setAddingUrssaf(false)}>Annuler</button>
                    <button className="btn pri" onClick={saveUrssafEntry}>Enregistrer</button>
                  </div>
                </div>
              )}

              {Object.values(urssafHistory || {}).some(h => h.length > 1) && (
                <button onClick={() => setShowUrssafHistory(v => !v)}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11.5, color: "var(--faint)", marginTop: 6, padding: 0 }}>
                  {showUrssafHistory ? "Masquer l'historique" : "Voir l'historique complet"}
                </button>
              )}
              {showUrssafHistory && (
                <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
                  {CATS_META.map(m => {
                    const hist = ((urssafHistory || {})[m.key] || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
                    if (hist.length <= 1) return null;
                    return (
                      <div key={m.key}>
                        <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 3 }}>{m.label}</div>
                        {hist.map(e => (
                          <div key={e.from} style={{ display: "flex", gap: 8, fontSize: 12, color: "var(--soft)", paddingLeft: 8, alignItems: "center", marginBottom: 2 }}>
                            <span style={{ color: "var(--faint)" }}>depuis {new Date(e.from + "T00:00:00").toLocaleDateString("fr-FR")}</span>
                            <span>{pct(e.social)}</span>
                            {e.lib > 0 && <span style={{ color: "var(--faint)" }}>{pct(e.lib)} libér.</span>}
                            <button onClick={() => deleteUrssafEntry(m.key, e.from)}
                              style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: "var(--faint)", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>✕</button>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 8 }}>TVA · taux disponibles</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                {(tvaConfig || []).map(tv => (
                  <span key={tv.v} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "var(--line)", borderRadius: 999, padding: "4px 10px", fontSize: 13 }}>
                    {tv.label}
                    {(tvaConfig || []).length > 1 && (
                      <button onClick={() => setTvaConfig((tvaConfig || []).filter(t => t.v !== tv.v))}
                        style={{ background: "none", border: "none", cursor: "pointer", color: "var(--faint)", padding: 0, lineHeight: 1, fontSize: 13 }}>✕</button>
                    )}
                  </span>
                ))}
                {!addingTva ? (
                  <button className="btn" style={{ fontSize: 12.5, padding: "4px 10px" }} onClick={() => setAddingTva(true)}>+ Ajouter</button>
                ) : (
                  <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
                    <input type="number" step="0.1" min="0" max="100" className="in" placeholder="Ex : 5.5"
                      value={newTvaValue} onChange={e => setNewTvaValue(e.target.value)}
                      style={{ width: 70 }} />
                    <span style={{ fontSize: 12, color: "var(--soft)" }}>%</span>
                    <button className="btn pri" style={{ padding: "4px 10px", fontSize: 12.5 }} onClick={() => {
                      const v = parseFloat(newTvaValue) / 100;
                      if (!isNaN(v) && v >= 0 && !(tvaConfig || []).find(t => t.v === v)) {
                        const label = parseFloat(newTvaValue).toLocaleString("fr-FR") + " %";
                        setTvaConfig([...(tvaConfig || []), { v, label }].sort((a, b) => a.v - b.v));
                      }
                      setNewTvaValue(""); setAddingTva(false);
                    }}>OK</button>
                    <button className="btn" style={{ padding: "4px 10px", fontSize: 12.5 }} onClick={() => { setAddingTva(false); setNewTvaValue(""); }}>Annuler</button>
                  </span>
                )}
              </div>
            </div>
          </div>

          <div className="hint">
            Toutes vos données sont enregistrées automatiquement dans ce navigateur.
            Exportez un fichier JSON pour les sauvegarder ou les transférer sur un autre appareil.
          </div>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onExport}>
            <svg viewBox="0 0 24 24"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>
            Exporter JSON
          </button>
          <button className="btn" onClick={() => fileRef.current.click()}>
            <svg viewBox="0 0 24 24"><path d="M12 21V9M8 13l4-4 4 4M5 3h14"/></svg>
            Importer JSON
          </button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={onImport} />
          <button className="btn pri" style={{ marginLeft: "auto" }} onClick={onClose}>Terminé</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
