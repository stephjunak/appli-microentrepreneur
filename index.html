}

function DashboardTab({ facturesByMonth, factures, previsions = [], charges, profile, mIndex, cfeAnnuel = 0, cfeValide = false, cfeData = {}, urssafHistory = {}, onGoTo }) {
  const YEAR = useYear();
  const s = computeMonth({ facturesByMonth, charges, profile, mIndex, year: YEAR, cfeAnnuel, urssafHistory });
  const year = computeYear({ facturesByMonth, charges, profile, year: YEAR, cfeAnnuel, urssafHistory });

  const ttc = s.caTTC; // CA encaissé ce mois (TTC), point de départ commun

  // ===== Revenus en attente / à venir (n'entrent PAS dans les chiffres réels) =====
  const attenteTotal = totalFacturesEnAttente(facturesByMonth, profile, urssafHistory);
  const nextIdx = mIndex + 1;
  const prevNext = nextIdx <= 11 ? expandPrevisions(previsions, nextIdx, YEAR) : { items: [], total: 0 };

  // ---- décalages de prélèvement (réglés dans le profil) ----
  const urssafDec = (profile.urssafDecalage === undefined || profile.urssafDecalage === "") ? 2 : num(profile.urssafDecalage);
  const tvaDec    = (profile.tvaDecalage   === undefined || profile.tvaDecalage   === "") ? 1 : num(profile.tvaDecalage);
  // accès aux cotisations / TVA d'un mois, en franchissant la frontière d'année :
  // ex. l'URSSAF prélevée en janvier provient de novembre de l'année précédente.
  const prevYearMonths = computeYear({ facturesByMonth, charges, profile, year: YEAR - 1, urssafHistory });
  const cotisAt = (i) => { const mm = i >= 0 ? year[i] : prevYearMonths[12 + i]; return mm ? mm.cotis : 0; };
  const tvaAt   = (i) => { const mm = i >= 0 ? year[i] : prevYearMonths[12 + i]; return mm ? mm.tva   : 0; };
  const urssafJour = profile.urssafJour || 5;
  const tvaJour    = profile.tvaJour || 15;
  const moisLabel   = (idx) => MONTHS[((idx % 12) + 12) % 12].toLowerCase();
  const deMois      = (m) => /^[aâeéèiîoôuy]/.test(m) ? `d'${m}` : `de ${m}`;  // élision : "de avril" -> "d'avril"
  const originLabel = (off) => { const i = mIndex - off; return i < 0  ? `${moisLabel(i)} ${YEAR - 1}` : moisLabel(i); };
  const dueLabel    = (off) => { const i = mIndex + off; return i > 11 ? `${moisLabel(i)} ${YEAR + 1}` : moisLabel(i); };

  // ===== NOTION 1 — TRÉSORERIE : ce qui sort vraiment du compte ce mois =====
  const pastMonth = (off) => {
    const i = mIndex - off;
    const yr = i >= 0 ? YEAR : YEAR - 1;          // franchit la frontière d'année
    const mi = ((i % 12) + 12) % 12;
    return computeMonth({ facturesByMonth, charges, profile, mIndex: mi, year: yr, cfeAnnuel, urssafHistory });
  };
  const sUrssafPast = pastMonth(urssafDec);
  const sTvaPast    = pastMonth(tvaDec);
  const outUrssaf = sUrssafPast ? sUrssafPast.totalCotis : 0;
  const outTva    = (s.assujetti && sTvaPast) ? sTvaPast.tvaAreverser : 0;
  const outFrais  = s.totalDecaisse;                // frais réellement débités ce mois
  const outCfe    = mIndex === 11 ? cfeAnnuel : 0;  // CFE prélevée en décembre
  const cashOut   = outUrssaf + outTva + outFrais + outCfe;
  // split frais décaissés : récurrents vs achats ponctuels
  const outFraisRec = s.decaisseLines.filter(ch => ch.frequence !== "ponctuelle").reduce((a,c) => a + c.montantCalc, 0);
  const outAchats   = s.decaisseLines.filter(ch => ch.frequence === "ponctuelle").reduce((a,c) => a + c.montantCalc, 0);
  // revenu net = CA TTC − tout ce qui sort du compte ce mois
  const netCash     = ttc - cashOut;

  // provisions du mois (à mettre de côté)
  const provUrssaf = s.totalCotis;
  const provTva    = s.tvaAreverser;
  const provCfe    = s.cfeProv;
  const provFraisRec   = s.fraisLisseRec;
  const provFraisProv  = s.fraisLisseProv;
  const provFraisPonct = s.fraisLissePonct;
  const charged    = s.charged;

  // donut "à mettre de côté" : découpe le total à mettre de côté (charged) en charges à provisionner.
  // Plus de segment "résultat net" (il ne représentait rien de clair). TVA en tête ; la CFE rejoint "Provisions".
  const mdcData = [
    ...(s.assujetti ? [{ key: "tva", lab: `TVA ${deMois(moisLabel(mIndex))}`, val: provTva, color: FLOW_COLORS.tva, due: `prélevée le ${tvaJour} ${dueLabel(tvaDec)}` }] : []),
    { key: "urssaf", lab: `URSSAF ${deMois(moisLabel(mIndex))}`,   val: provUrssaf,    color: FLOW_COLORS.urssaf, due: `prélevé le ${urssafJour} ${dueLabel(urssafDec)}` },
    { key: "frec",   lab: "Frais récurrents",                      val: provFraisRec,  color: FLOW_COLORS.recurrent },
    { key: "fponct", lab: "Achats ponctuels",                      val: provFraisPonct, color: FLOW_COLORS.ponctuel },
    { key: "fprov",  lab: "Provisions",                            val: provFraisProv + provCfe, color: FLOW_COLORS.cfe },
  ].filter((d) => d.val > 0.005);

  // détail des provisions (frais trimestriels/annuels + CFE) — alimente l'infobulle de la ligne "Provisions"
  const provDetails = [];
  charges.forEach((ch) => {
    if (ch.frequence !== "trimestrielle" && ch.frequence !== "annuelle") return;
    const part = chargeLisse(ch, mIndex, YEAR);
    if (part <= 0.005) return;
    const imp = chargeImpact(ch, mIndex, YEAR);
    if (!imp.active) return;
    provDetails.push({
      lib: ch.libelle || "Frais", part, plein: tariffForMonth(ch, mIndex, YEAR),
      frac: ch.frequence === "trimestrielle" ? "1/3" : "1/12",
      echeance: `le ${parseInt(imp.dueDay, 10)} ${moisLabel(imp.dueMonth)}`,
      imminent: imp.dueMonth === mIndex + 1,
    });
  });
  if (num(cfeAnnuel) > 0) {
    provDetails.push({
      lib: cfeValide ? "CFE" : "CFE estimée", part: provCfe, plein: num(cfeAnnuel), frac: "1/12",
      echeance: "en décembre", imminent: mIndex === 10,
      note: cfeValide ? "avis confirmé" : "l'avis arrive en novembre",
    });
  }
  provDetails.sort((a, b) => (b.imminent ? 1 : 0) - (a.imminent ? 1 : 0));
  const provImminent = provDetails.some((p) => p.imminent);
  const mdcTotal = mdcData.reduce((a, d) => a + d.val, 0) || 1;
  // donut en secteurs pleins à coins arrondis. Épaisseur de bande = hauteur de la barre (~26px). 0 = haut, sens horaire.
  const MDC_RI = 34, MDC_RO = 58, MDC_CR = 8, MDC_GAPDEG = 3, MDC_POP = 6;
  let _mdcAcc = 0;
  const mdcArcs = mdcData.map((d) => {
    const frac = d.val / mdcTotal;
    const a1deg = _mdcAcc * 360, a2deg = (_mdcAcc + frac) * 360;
    _mdcAcc += frac;
    const g = MDC_GAPDEG / 2;
    const a1 = (a1deg + g) * Math.PI / 180, a2 = (a2deg - g) * Math.PI / 180;
    const mid = ((a1deg + a2deg) / 2) * Math.PI / 180;
    const path = a2 > a1 ? annularSeg(70, 70, MDC_RI, MDC_RO, a1, a2, MDC_CR) : "";
    return { ...d, path, tx: MDC_POP * Math.sin(mid), ty: -MDC_POP * Math.cos(mid) };   // déplacement radial vers l'extérieur
  }).filter((a) => a.path);

  const [histScope,  setHistScope]  = React.useState("month");
  const [synthMode,  setSynthMode]  = React.useState("reel");
  const [synthBase,  setSynthBase]  = React.useState("ttc"); // base HT / TTC, pilote graphe + détail de la synthèse
  const [mdcHover,   setMdcHover]   = React.useState(null);  // segment du donut "à mettre de côté" survolé
  const mdcHoverData = mdcData.find((d) => d.key === mdcHover);

  // synthèse annuelle (cumul jusqu'au mois affiché)
  const ys = computeYearSummary({ facturesByMonth, charges, profile, uptoMonth: mIndex, year: YEAR, prevYear: (profile.prevYears || {})[YEAR - 1], cfeAnnuel, urssafHistory });

  // (le graphe "Années" est construit plus bas, voir yearBarsData)

  const segsMonth = [
    { key: "tva",      lab: "TVA reversée",       val: outTva,               color: FLOW_COLORS.tva },
    { key: "urssaf",   lab: "Cotisations URSSAF", val: outUrssaf,            color: FLOW_COLORS.urssaf },
    { key: "frais",    lab: "Frais",              val: outFraisRec + outAchats, color: FLOW_COLORS.recurrent },
    { key: "cfe",      lab: "CFE",                val: outCfe,               color: FLOW_COLORS.cfe },
    { key: "net",      lab: "Ce qui te reste = revenu net", val: Math.max(0, netCash), color: FLOW_COLORS.net },
  ].filter(x => x.val > 0.005);

  // valeurs réellement payées cumul jan → mIndex (même logique que le mode mois)
  let yCumulUrssaf = 0, yCumulTva = 0, yCumulFrais = 0, yCumulFraisHT = 0, yCumulCfe = 0;
  for (let i = 0; i <= mIndex; i++) {
    yCumulUrssaf += cotisAt(i - urssafDec);
    if (s.assujetti) yCumulTva += tvaAt(i - tvaDec);
    yCumulFrais += year[i].decaisse;
    yCumulFraisHT += year[i].decaisseHT;
    if (i === 11) yCumulCfe += cfeAnnuel;
  }
  const yCumulCashOut = yCumulUrssaf + yCumulTva + yCumulFrais + yCumulCfe;
  const yCumulNet     = Math.max(0, ys.caTTC - yCumulCashOut);

  // série trésorerie par mois (cash réellement entré − sorti chaque mois) pour les barres
  const tresoByMonth = year.map((y, i) => {
    const u = cotisAt(i - urssafDec);
    const t = s.assujetti ? tvaAt(i - tvaDec) : 0;
    return y.caTTC - u - t - y.decaisse - (i === 11 ? cfeAnnuel : 0);
  });
  // bascule trésorerie / réel pour la synthèse annuelle
  const synthBaseHT = synthBase === "ht" && s.assujetti && synthMode !== "treso";   // frais nets de TVA déductible en vue HT (Résultat uniquement)
  const synthFig = synthMode === "treso"
    ? { tva: yCumulTva, urssaf: yCumulUrssaf, frais: synthBaseHT ? yCumulFraisHT : yCumulFrais, cfe: yCumulCfe, net: yCumulNet, netLabel: "Revenu net cumulé", graphLabel: "Revenu net" }
    : { tva: ys.tvaLisse, urssaf: ys.cotis,  frais: synthBaseHT ? ys.fraisLisseHT : ys.fraisLisse, cfe: ys.cfe, net: ys.netLisse, netLabel: "Résultat net cumulé", graphLabel: "Résultat net" };
  const barSeries  = synthMode === "treso" ? tresoByMonth : year.map((y) => y.netLisse);
  const maxAbsBars = Math.max(1, ...barSeries.map((v) => Math.abs(v)));

  const donutSegs = segsMonth;
  const donutTot  = donutSegs.reduce((a,x) => a + x.val, 0) || 1;

  // mention sous le titre de la synthèse : sens de la vue + précision sur le timing des charges
  const moisAnPrec = (off) => `${MONTHS[(((-off) % 12) + 12) % 12].toLowerCase()} ${YEAR - 1}`;
  const synthTagline = synthMode === "treso" ? "Les mouvements réels de ta trésorerie" : "La performance de ton activité";
  const synthPrecision = synthMode === "treso"
    ? `En vue "Trésorerie", on ne compte que ce qui est réellement sorti du compte ce mois. La TVA et l'URSSAF des derniers mois ne sont pas encore prélevées, donc absentes ici ; à l'inverse, l'URSSAF de ${moisAnPrec(urssafDec)} et la TVA de ${moisAnPrec(tvaDec)} sont comptées, car prélevées en début d'année. Les frais payés au trimestre ou à l'année sont déduits en entier le mois de leur échéance, ce qui peut peser lourd sur la trésorerie de ce mois-là (la CFE en décembre, par exemple).`
    : `En vue "Résultat", on déduit chaque mois les charges générées par l'activité, même si elles seront prélevées plus tard. L'URSSAF et la TVA sont comptées dès le mois où elles sont dues. Les frais payés au trimestre ou à l'année, ainsi que la CFE le cas échéant, sont lissés : leur montant est réparti mois par mois en provision, au lieu d'être imputé d'un coup au mois du paiement. La vue reflète ainsi ce que ton activité coûte réellement chaque mois, indépendamment du calendrier des prélèvements.`;

  // base HT / TTC : uniformise le graphe ET le détail chiffré de la synthèse
  const assujetti = !!profile.tva;
  const baseTTC = synthBase === "ttc" || !assujetti || synthMode === "treso"; // sans TVA, HT = TTC ; la Trésorerie est toujours en TTC (argent réel du compte)
  const synthIncome = baseTTC ? ys.caTTC : ys.caHT;
  const showTvaRow = baseTTC && assujetti;
  const synthNet = synthIncome - (showTvaRow ? synthFig.tva : 0) - synthFig.urssaf - synthFig.frais - synthFig.cfe;
  // Hauteur figée du détail : on réserve la place des lignes conditionnelles (TVA si assujetti, CFE si configurée)
  // pour que la colonne ne bouge plus au toggle Trésorerie/Résultat (ni HT/TTC). 36px par ligne + 13px de gap.
  const hasCfe = num(cfeAnnuel) > 0 || num((cfeData[YEAR] || {}).montant) > 0;
  const detailRowsMax = 1 + (assujetti ? 1 : 0) + 1 + 1 + (hasCfe ? 1 : 0); // CA + TVA + URSSAF + Frais + CFE
  const detailMinH = detailRowsMax * 36 + (detailRowsMax - 1) * 13;
  const isTreso = synthMode === "treso";
  const monthBars = year.map((y, i) => {
    const u  = isTreso ? cotisAt(i - urssafDec) : y.cotis;
    const tv = !assujetti ? 0 : (isTreso ? tvaAt(i - tvaDec) : y.tvaLisse);
    const fr = isTreso ? ((baseTTC ? y.decaisse : y.decaisseHT) + (i === 11 ? cfeAnnuel : 0)) : ((baseTTC ? y.fraisLisse : y.fraisLisseHT) + cfeAnnuel / 12);
    const total = baseTTC ? y.caTTC : y.caHT;
    const tva = baseTTC ? tv : 0;
    return { label: SHORT_MONTHS[i], total, poche: Math.max(0, total - tva - u - fr), urssaf: u, tva, frais: fr, future: i > mIndex || !(total > 0) };
  });
  const monthMax = Math.max(1, ...year.map((y) => baseTTC ? y.caTTC : y.caHT));
  const monthCats = [
    { key: "poche",  lbl: (isTreso || histScope === "year") ? "Revenu net" : "Résultat net", color: "var(--seg-poche)" },
    { key: "frais",  lbl: "Frais",    color: "var(--seg-frais)" },
    { key: "urssaf", lbl: "URSSAF",   color: "var(--seg-urssaf)" },
    ...(showTvaRow ? [{ key: "tva", lbl: "TVA", color: "var(--seg-tva)", outline: true }] : []),
  ];

  // ===== Graphe "Années" : une barre de trésorerie par année (CA TTC/HT découpé) =====
  // Année suivie dans l'app -> découpe calculée ; année seulement saisie à la main -> barre pleine.
  const tresoYearAgg = (yr) => {
    const cur = computeYear({ facturesByMonth, charges, profile, year: yr, urssafHistory });
    const prv = computeYear({ facturesByMonth, charges, profile, year: yr - 1, urssafHistory });
    const cotisOf = (i) => { const mm = i >= 0 ? cur[i] : prv[12 + i]; return mm ? mm.cotis : 0; };
    const tvaOf   = (i) => { const mm = i >= 0 ? cur[i] : prv[12 + i]; return mm ? mm.tva : 0; };
    let urssaf = 0, tva = 0, frais = 0, fraisHT = 0, caTTC = 0, caHT = 0;
    for (let i = 0; i < 12; i++) {
      urssaf += cotisOf(i - urssafDec);
      if (assujetti) tva += tvaOf(i - tvaDec);
      frais += cur[i].decaisse;
      fraisHT += cur[i].decaisseHT;
      caTTC += cur[i].caTTC;
      caHT  += cur[i].caHT;
    }
    const cfeYr = num((cfeData[yr] || {}).montant) || 0;   // CFE de l'année (prélevée en décembre, sans TVA)
    frais += cfeYr;
    fraisHT += cfeYr;
    return { caTTC, caHT, urssaf, tva, frais, fraisHT };
  };
  const yearHasData = (yr) => Object.keys(facturesByMonth || {}).some((k) => k.startsWith(yr + "-"));
  const yearsSet = new Set([YEAR]);
  Object.keys(facturesByMonth || {}).forEach((k) => { const y = parseInt(k.slice(0, 4), 10); if (y) yearsSet.add(y); });
  Object.entries(profile.prevYears || {}).forEach(([y, d]) => { if (d && num(d.caTTC) > 0) yearsSet.add(parseInt(y, 10)); });
  const yearBarsData = [...yearsSet].filter((y) => y <= YEAR).sort((a, b) => a - b).map((yr) => {
    if (yr === YEAR) {                                  // année en cours : cumul jan → mois affiché
      const total = baseTTC ? ys.caTTC : ys.caHT;
      const tva = baseTTC ? yCumulTva : 0;
      const frais = (baseTTC ? yCumulFrais : yCumulFraisHT) + yCumulCfe;
      return { label: `${yr} *`, total, poche: Math.max(0, total - tva - yCumulUrssaf - frais), urssaf: yCumulUrssaf, tva, frais, future: false };
    }
    if (yearHasData(yr)) {                              // année complète suivie dans l'app
      const a = tresoYearAgg(yr);
      const total = baseTTC ? a.caTTC : a.caHT;
      const tva = baseTTC ? a.tva : 0;
      const frais = baseTTC ? a.frais : a.fraisHT;
      return { label: String(yr), total, poche: Math.max(0, total - tva - a.urssaf - frais), urssaf: a.urssaf, tva, frais, future: false };
    }
    const d = (profile.prevYears || {})[yr] || {};     // année saisie à la main : barre pleine
    return { label: String(yr), total: baseTTC ? num(d.caTTC) : num(d.caHT), poche: 0, urssaf: 0, tva: 0, frais: 0, plain: true, future: false };
  });
  const yearBarsMax = Math.max(1, ...yearBarsData.map((d) => d.total));

  // carte héros Recettes : écart des recettes (CA HT encaissé) vs mois précédent.
  // Franchit la frontière d'année : en janvier, on compare à décembre n-1.
  const recPrev = mIndex > 0 ? year[mIndex - 1].caHT : prevYearMonths[11].caHT;
  const recPct = (Math.abs(recPrev) > 0.005)
    ? Math.round((s.caHT - recPrev) / Math.abs(recPrev) * 100) : null;

  return (
    <div className="dash">

      {/* === Haut : CA · Revenu net (g.) · barre (dessous) · donut à mettre de côté (droite) === */}
      <div className="dash-top" style={{ marginBottom: 14 }}>

        {/* Chiffre d'affaires encaissé */}
        <div className="card hero-kpi dt-ca">
          <div className="card-b">
            <div className="hero-top">
              <span className="cap">Recettes</span>
              {recPct != null && (() => {
                const frac = Math.tanh(recPct / 40), up = recPct >= 0;
                return (
                  <span className="lvl" title={`Recettes ${up ? "+" : ""}${recPct}% vs ${moisLabel(mIndex - 1)}`}>
                    <span className="lvl-tube" style={{ background: up ? "var(--pos-soft)" : "var(--neg-soft)" }}>
                      <span className="lvl-mark" style={{ left: "30%" }}></span>
                      <span className="lvl-mark" style={{ left: "70%" }}></span>
                      <span className="lvl-bubble" style={{ left: (50 + frac * 26) + "%" }}></span>
                    </span>
                    <span className="lvl-pct" style={{ color: up ? "var(--pos)" : "var(--neg)" }}>{up ? "+" : ""}{recPct}% vs {moisLabel(mIndex - 1)}</span>
                  </span>
                );
              })()}
            </div>
            <div className="big">{eur0(s.caHT)}{s.assujetti && <span style={{ fontSize: 16, fontWeight: 500, color: "var(--faint)" }}> HT</span>}</div>
            <div className="hero-sub">{s.assujetti ? `${eur0(s.caTTC)} TTC · ` : ""}{s.nbFactures} facture{s.nbFactures !== 1 ? "s" : ""} encaissée{s.nbFactures !== 1 ? "s" : ""}</div>
            <div className="ca-attente">
              <span className="ca-attente-txt">Factures en attente <b>{eur0(attenteTotal.ht)}</b>{s.assujetti ? " HT" : ""}{attenteTotal.n > 0 ? ` · ${attenteTotal.n} fact.` : ""}</span>
              <button type="button" className="link-detail" onClick={() => onGoTo && onGoTo("factures")}>voir les factures →</button>
            </div>
          </div>
        </div>

        {/* Revenu net (trésorerie) */}
        <div className="card hero-kpi dt-rev">
          <div className="card-b">
            <div className="hero-top">
              <span className="cap">Revenu net</span>
            </div>
            <div className="kpi-detail kpi-detail--num" tabIndex={0}>
              <div className={"big big-cit" + (netCash >= 0 ? "" : " neg")}>{eur0(netCash)}</div>
              <div className="kpi-tip kpi-tip--eq">
                <b>{eur0(ttc)}</b> <span className="muted">CA TTC</span> <span className="op">−</span> <b>{eur0(ttc - netCash)}</b> <span className="muted">charges</span> <span className="op">=</span> <b className="pos">{eur0(netCash)}</b>
              </div>
            </div>
            <div className="hero-sub">après prélèvement des charges du mois</div>
            <div className="ca-attente">
              <span className="ca-attente-txt">Total des prélèvements ce mois <b>{eur0(ttc - netCash)}</b></span>
              <button type="button" className="link-detail" onClick={() => onGoTo && onGoTo("calendrier")}>voir le calendrier →</button>
            </div>
          </div>
        </div>

        {/* Où part mon argent ? (ce qui sort réellement du compte ce mois) */}
        <div className="card dt-bar">
          <div className="card-b">
            <div className="panel-head" style={{ marginBottom: 12 }}>
              <div>
                <h2 className="panel-title">Où part mon argent ce mois-ci ?</h2>
                <p className="panel-kicker">Tout ton encaissement TTC, réparti d'un coup d'œil. Survole un bloc pour le détail.</p>
              </div>
            </div>
            <div className="bar-brace-lbl">{eur0(ttc)} TTC <span className="sub">· 100 % de ce qui est entré</span></div>
            <div className="bar-brace"></div>
            <SpendBar segs={donutSegs} total={donutTot} ttc={ttc} />
          </div>
        </div>

        {/* À mettre de côté (donut : découpe le total à mettre de côté en charges à provisionner) */}
        <div className="prov-card dt-donut">
          <div className="cap">À METTRE DE CÔTÉ CE MOIS</div>
          <div className="big">{eur0(charged)}</div>
          <div style={{ fontSize: 12, color: "var(--ink-faint)", marginBottom: 10, marginTop: -10 }}>Certaines charges sont payées en différé, il faut l'anticiper</div>
          <div className="donut-wrap">
            <svg className="donut-svg" data-on={mdcHover ? "" : undefined} viewBox="0 0 140 140" width="156" height="156" role="img" aria-label="Répartition des charges à mettre de côté ce mois">
              {mdcArcs.map((a) => {
                const handlers = { onMouseEnter: () => setMdcHover(a.key), onMouseLeave: () => setMdcHover(null) };
                const dim = mdcHover && mdcHover !== a.key ? "" : undefined;
                const pop = mdcHover === a.key ? { transform: `translate(${a.tx}px, ${a.ty}px)` } : undefined;
                return (
                  <path key={a.key} d={a.path} className="donut-arc" fill={a.color}
                    stroke={a.key === "tva" ? "var(--line-2)" : "none"} strokeWidth={a.key === "tva" ? 1.2 : 0}
                    data-dim={dim} style={pop} {...handlers} />
                );
              })}
            </svg>
            {mdcHover && mdcHover !== "fprov" &&
              <div className="donut-tip">{mdcHoverData.lab} · {Math.round(mdcHoverData.val / mdcTotal * 100)} %{mdcHoverData.due && <small>{mdcHoverData.due}</small>}</div>}
          </div>
          <div className="donut-leg" data-on={mdcHover ? "" : undefined}>
            {mdcData.map((d) => (
              <div className="li" key={d.key} data-dim={mdcHover && mdcHover !== d.key ? "" : undefined}
                onMouseEnter={() => setMdcHover(d.key)} onMouseLeave={() => setMdcHover(null)}
                style={d.key === "fprov" ? { position: "relative" } : undefined}>
                <span className="sw2" style={{ background: d.color, boxShadow: d.key === "tva" ? "inset 0 0 0 1px var(--line-2)" : undefined }}></span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>{d.lab}{d.key === "fprov" && provImminent && <span className="prov-alert" title="échéance le mois prochain">!</span>}</span>
                <b>{eur0(d.val)}</b>
                {d.key === "fprov" && mdcHover === "fprov" && provDetails.length > 0 &&
                  <div className="prov-tip">
                    <div className="prov-tip-h">Provisions à mettre de côté ce mois</div>
                    {provDetails.map((p, i) => (
                      <div className="prov-tip-row" key={i}>
                        <span style={{ width: 16, flex: "none" }}>{p.imminent ? <span className="prov-alert">!</span> : null}</span>
                        <div><span className="prov-tip-name">{p.lib}</span> — {eur0(p.part)}/mois ({p.frac})<div className="prov-tip-sub">{eur0(p.plein)} {p.echeance}{p.imminent ? " · le mois prochain" : ""}{p.note ? " · " + p.note : ""}</div></div>
                      </div>
                    ))}
                  </div>}
              </div>
            ))}
          </div>
        </div>

      </div>

      {/* === Rangée du bas : calendrier (large, sous la barre) · prévisionnel (sous le donut) === */}
      <div className="dash-row3">

          {/* Calendrier des prélèvements (large, aligné sous "où part mon argent") */}
          <MiniDashCalendar key={mIndex} mIndex={mIndex} charges={charges} profile={profile} cfeAnnuel={cfeAnnuel} facturesByMonth={facturesByMonth} urssafHistory={urssafHistory} />

          {/* Prévisionnel du mois suivant */}
          <div className="card dr-prev">
            <div className="card-h"><h2>Prévisionnel</h2><span className="sub">revenus attendus en {moisLabel(nextIdx)}</span></div>
            <div className="card-b">
              <div className="treso-cascade">
                {prevNext.items.map((p) =>
                <div className="treso-row" key={p.id}>
                  <span className="lab">{p.client || p.libelle || "Revenu prévu"}{p.recurrence === "mensuelle" && <em style={{ color: "var(--faint)", fontStyle: "normal", fontSize: 11.5 }}> · mensuel</em>}</span>
                  <b>{eur0(num(p.montant))}</b>
                </div>)}
                {prevNext.items.length === 0 &&
                <div className="treso-row"><span className="lab" style={{ color: "var(--faint)" }}>Aucun revenu prévu</span><b></b></div>}
                {prevNext.items.length > 0 &&
                <div className="treso-row net-row">
                  <span className="lab">Total attendu</span>
                  <b className="pos">{eur0(prevNext.total)}</b>
                </div>}
              </div>
              <p style={{ fontSize: 11.5, color: "var(--faint)", margin: "10px 0 0" }}>Supposé, non encaissé. N'entre ni dans ton CA ni dans ton URSSAF.</p>
            </div>
          </div>

      </div>

      {/* Synthèse annuelle */}
      <div className="card">
        <div className="card-h"><h2>Synthèse {YEAR}</h2><span className="sub synth-sub">cumul jan → {MONTHS[mIndex].slice(0, 4).toLowerCase()}.</span>
          <div className="viewseg sm" style={{ marginLeft: "auto" }}>
            <button className={synthMode === "treso" ? "on" : ""} onClick={() => setSynthMode("treso")}>Trésorerie</button>
            <button className={synthMode === "reel" ? "on" : ""} onClick={() => setSynthMode("reel")}>Résultat</button>
          </div>
          {assujetti && synthMode === "reel" &&
          <div className="viewseg sm ghost" style={{ marginLeft: 10 }}>
            <button className={synthBase === "ttc" ? "on" : ""} onClick={() => setSynthBase("ttc")}>TTC</button>
            <button className={synthBase === "ht" ? "on" : ""} onClick={() => setSynthBase("ht")}>HT</button>
          </div>}
        </div>
        <div className="card-b">
          <div className="synth-split">
            <div className="synth-graph">
              <div className="synth-graph-h">
                <span className="cap">{histScope === "month" ? (baseTTC ? "CA TTC par mois" : "CA HT par mois") : (baseTTC ? "CA TTC par année" : "CA HT par année")}</span>
                <div className="viewseg sm ghost" style={{ marginLeft: "auto" }}>
                  <button className={histScope === "month" ? "on" : ""} onClick={() => setHistScope("month")}>Mois</button>
                  <button className={histScope === "year" ? "on" : ""} onClick={() => setHistScope("year")}>Années</button>
                </div>
              </div>
              {histScope === "month" ? (
                <AnnualBars months={monthBars} max={monthMax} cats={monthCats} totalLabel={baseTTC ? "TTC" : "HT"} />
              ) : yearBarsData.length < 2 ? (
                <div className="empty" style={{ fontSize: 13 }}>
                  Renseigne le CA d'une année précédente dans les paramètres (icône engrenage) pour comparer tes années.
                </div>
              ) : (
                <AnnualBars months={yearBarsData} max={yearBarsMax} cats={monthCats} totalLabel={baseTTC ? "TTC" : "HT"} />
              )}
            </div>
            <div className="synth-figures">
              {/* Net cumulé en haut : ancre stable, ne bouge pas selon le toggle */}
              <div className="ysum2">
                <div className="yrow2 tot">
                  <div className="yrow2-top"><span className="lab">{synthFig.netLabel}</span><b>{eur0(synthNet)}</b></div>
                  <div className="yrow2-bar"><i style={{ width: Math.min(100, Math.round(Math.max(0, synthNet) / (synthIncome || 1) * 100)) + "%", background: "var(--seg-poche)" }}></i></div>
                </div>
              </div>
              <div className="synth-note">
                <span>{synthTagline}</span>
                <span className="synth-info" tabIndex={0} aria-label="Plus de détails sur le calcul">
                  <i aria-hidden="true">i</i>
                  <span className="synth-info-tip">{synthPrecision}</span>
                </span>
              </div>
              <div className="synth-detail-cap">Détail du calcul</div>
              {/* Détail en dessous. Hauteur figée (réserve la place des lignes conditionnelles TVA / CFE) */}
              <div className="ysum2 synth-detail" style={{ minHeight: detailMinH }}>
                {[
                  { lab: baseTTC ? "CA encaissé (TTC)" : "CA encaissé (HT)", val: synthIncome, neg: false, color: "#b9bbb0", show: true },
                  { lab: `TVA ${synthMode === "treso" ? "reversée" : "à reverser"}`, val: synthFig.tva, neg: true, color: "var(--seg-tva)", outline: true, show: showTvaRow },
                  { lab: "URSSAF", val: synthFig.urssaf, neg: true, color: "var(--seg-urssaf)", show: true },
                  { lab: "Frais & achats", val: synthFig.frais, neg: true, color: "var(--seg-frais)", show: true },
                  { lab: cfeValide ? "CFE" : "CFE estimée", val: synthFig.cfe, neg: true, color: "var(--seg-frais)", show: synthFig.cfe > 0 },
                ].filter((r) => r.show).map((r, i) => (
                  <div className="yrow2" key={i}>
                    <div className="yrow2-top"><span className="lab">{r.lab}</span><b>{r.neg ? "−" : ""}{eur0(r.val)}</b></div>
                    <div className="yrow2-bar"><i style={{ width: Math.min(100, Math.round(r.val / (synthIncome || 1) * 100)) + "%", background: r.color, boxShadow: r.outline ? "inset 0 0 0 1px var(--line-2)" : undefined }}></i></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>);

}

// Carte facture en lecture seule. Modification via le crayon (ouvre InvoiceModal).
// Bouton "Marquer payée" + petit popover de choix de la date d'encaissement (défaut aujourd'hui).
// Partagé par l'onglet Factures et l'onglet Prévisionnel.
function MarkPaidButton({ onConfirm }) {
  const [open, setOpen] = React.useState(false);
  const [date, setDate] = React.useState(TODAY);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);
  return (
    <span className="inv-pay-wrap" ref={ref} onClick={(e) => e.stopPropagation()}>
      <button className="btn inv-pay" onClick={(e) => { e.stopPropagation(); setDate(TODAY); setOpen((o) => !o); }}>{Icon.check}Marquer payée</button>
      {open &&
        <div className="pay-pop">
          <label className="pay-pop-lab">Date d'encaissement</label>
          <input className="in" type="date" value={date} onChange={(e) => setDate(e.target.value)} />
          <div className="pay-pop-act">
            <button className="btn" onClick={() => setOpen(false)}>Annuler</button>
            <button className="btn" style={{ background: "var(--ink)", color: "#fff", borderColor: "var(--ink)" }} onClick={() => { onConfirm(date); setOpen(false); }}>Valider</button>
          </div>
        </div>}
    </span>
  );
}

function InvoiceCard({ f, profile, mIndex, onEdit, onRemoveInv, onMarkPaid, urssafHistory = {} }) {
  const YEAR = useYear();
  const assujetti = !!profile.tva;
  const t = factureTotals(f, profile, urssafHistory);
  const lines = linesOf(f);
  const attente = !isPaid(f);
  const [open, setOpen] = React.useState(false);
  const montant = t.ht;
  const dateLabel = f.date
    ? new Date(f.date + "T00:00:00").toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" })
    : "Date manquante";
  // date d'encaissement (réelle ou présumée = date d'émission) + repérage d'un encaissement hors du mois affiché
  const dp = f.datePaiement || f.date;
  const paidLabel = dp
    ? new Date(dp + "T00:00:00").toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" })
    : null;
  const autreMois = !attente && dp && mIndex != null && dp.slice(0, 7) !== `${YEAR}-${pad2(mIndex)}`;
  const moisEncLabel = autreMois ? MONTHS[parseInt(dp.slice(5, 7), 10) - 1].toLowerCase() : "";
  return (
    <div className="card invoice" data-open={open ? "" : undefined}>
      <div className="inv-h" role="button" tabIndex={0} aria-expanded={open}
        onClick={() => setOpen((o) => !o)}
        onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setOpen((o) => !o); } }}>
        <span className="inv-chevron" aria-hidden="true">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4l4 4-4 4" /></svg>
        </span>
        <span className="inv-date" style={{ color: f.date ? "var(--ink)" : "#d9534f" }}>{dateLabel}</span>
        <span className="inv-client">{f.client || <em style={{ color: "var(--faint)", fontWeight: 400 }}>Sans client</em>}</span>
        <span className="inv-status">
          {attente
            ? <>
                <span className="tariff-status attn">En attente</span>
                {onMarkPaid &&
                  <MarkPaidButton onConfirm={(date) => onMarkPaid(f.id, date)} />}
              </>
            : <span className="inv-paid" tabIndex={0} onClick={(e) => e.stopPropagation()}>
                <span className="tariff-status current">Payée</span>
                {autreMois && <span className="inv-clock">{Icon.clock}</span>}
                {paidLabel &&
                  <span className="inv-tip" role="tooltip">
                    <span className="inv-tip-d">Encaissée le {paidLabel}</span>
                    {autreMois && <span className="inv-tip-m">{Icon.clock} comptée en {moisEncLabel}</span>}
                  </span>}
              </span>}
        </span>
        <span className="inv-amount">{eur(montant)}<span className="inv-amount-u">HT</span></span>
        <span className="inv-actions">
          <button className="del" title="Modifier la facture" onClick={(e) => { e.stopPropagation(); onEdit(f); }}>{Icon.pencil}</button>
          <button className="del" title="Supprimer la facture" onClick={(e) => { e.stopPropagation(); onRemoveInv(f.id); }}>{Icon.trash}</button>
        </span>
      </div>
      {open &&
      <div className="inv-b">
        <table className="tbl">
          <thead>
            <tr>
              <th>Description de la prestation</th>
              <th style={{ width: 180 }}>Taux URSSAF</th>
              <th className="r" style={{ width: 120 }}>Montant HT</th>
              {assujetti && <th className="c" style={{ width: 96 }}>TVA</th>}
              {assujetti && <th className="r" style={{ width: 120 }}>Montant TTC</th>}
            </tr>
          </thead>
          <tbody>
            {lines.map((l) =>
            <tr key={l.id}>
                <td>{l.description || <span style={{ color: "var(--faint)" }}>—</span>}</td>
                <td>{RATES[l.categorie].short} · {pct(RATES[l.categorie].social)}</td>
                <td className="num">{eur(num(l.montant))}</td>
                {assujetti && <td className="c">{pct(num(l.tva))}</td>}
                {assujetti && <td className="num ttc-cell">{eur(num(l.montant) * (1 + num(l.tva)))}</td>}
              </tr>
            )}
          </tbody>
          <tfoot>
            <tr className="sumrow">
              <td colSpan={2} className="sumlab">Total facture</td>
              <td className="num"><b>{eur(t.ht)}</b></td>
              {assujetti && <td className="c sum-tva">{eur(t.tva)}</td>}
              {assujetti && <td className="num"><b>{eur(t.ttc)}</b></td>}
            </tr>
          </tfoot>
        </table>
        <div className="inv-net-line">Net estimé après URSSAF <b>{eur(t.net)}</b></div>
      </div>}
    </div>);
}

// Modale de création / modification d'une facture. Travaille sur un brouillon local :
// rien n'est enregistré tant que l'utilisateur n'a pas cliqué sur "Valider".
function InvoiceModal({ initial, heading, profile, urssafHistory = {}, tvaConfig, onSave, onClose }) {
  const assujetti = !!profile.tva;
  const activeTvaRates = tvaConfig || TVA_RATES;
  const [draft, setDraft] = React.useState(() => ({
    id: (initial && initial.id) || uid(),
    date: (initial && initial.date) || "",
    datePaiement: (initial && initial.datePaiement) || "",
    statut: initial ? (isPaid(initial) ? "paye" : "attente") : "attente",
    client: (initial && initial.client) || "",
    lines: (initial && initial.lines && initial.lines.length)
      ? initial.lines.map((l) => ({ ...l }))
      : [newLine(profile.tva)],
  }));
  const t = factureTotals(draft, profile, urssafHistory);
  const lines = linesOf(draft);
  const enAttente = draft.statut === "attente";
  const setField = (field, val) => setDraft((d) => ({ ...d, [field]: val }));
  // bascule payée / en attente : une facture en attente n'a pas de date de paiement (inconnue)
  const setStatut = (statut) => setDraft((d) => ({
    ...d, statut,
    datePaiement: statut === "attente" ? "" : (d.datePaiement || d.date || ""),
  }));
  const setLine = (lid, field, val) => setDraft((d) => ({ ...d, lines: d.lines.map((l) => (l.id === lid ? { ...l, [field]: val } : l)) }));
  const addLine = () => setDraft((d) => ({ ...d, lines: [...d.lines, newLine(profile.tva)] }));
  const removeLine = (lid) => setDraft((d) => ({ ...d, lines: d.lines.filter((l) => l.id !== lid) }));
  const canSave = !!draft.date;
  return (
    <div className="scrim" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: "min(560px, 100%)" }}>
        <div className="modal-h">
          <h3>{heading || (initial ? "Modifier la facture" : "Nouvelle facture")}</h3>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <div className="field" style={{ flex: "0 0 170px", marginBottom: 0 }}>
              <label>Date d'édition</label>
              <input className={"in" + (!draft.date ? " field-missing" : "")} type="date" value={draft.date} onChange={(e) => setField("date", e.target.value)} />
            </div>
            <div className="field" style={{ flex: 1, minWidth: 200, marginBottom: 0 }}>
              <label>Client</label>
              <input className="in" placeholder="Nom du client" value={draft.client} list="mef-clients" onChange={(e) => setField("client", e.target.value)} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 14, alignItems: "flex-end" }}>
            <div className="field" style={{ marginBottom: 0 }}>
              <label>Statut</label>
              <div className="viewseg sm">
                <button type="button" className={!enAttente ? "on" : ""} onClick={() => setStatut("paye")}>Encaissée</button>
                <button type="button" className={enAttente ? "on" : ""} onClick={() => setStatut("attente")}>En attente</button>
              </div>
            </div>
            {!enAttente
              ? <div className="field" style={{ flex: "0 0 170px", marginBottom: 0 }}>
                  <label>Date de paiement</label>
                  <input className="in" type="date" value={draft.datePaiement} onChange={(e) => setField("datePaiement", e.target.value)} />
                </div>
              : <div className="field" style={{ flex: 1, minWidth: 200, marginBottom: 0 }}>
                  <div style={{ fontSize: 12.5, color: "var(--faint)", paddingBottom: 8 }}>Pas encore encaissée : elle n'entre pas dans ton CA ni ton URSSAF tant qu'elle n'est pas payée.</div>
                </div>
            }
          </div>
          <div className="inv-lines">
            {lines.map((l) =>
              <div className="inv-line" key={l.id}>
                <div className="il-desc">
                  <div className="field il-grow">
                    <label>Description de la prestation</label>
                    <input className="cell-in" placeholder="Ex : création de contenu pour la campagne d'automne" value={l.description} onChange={(e) => setLine(l.id, "description", e.target.value)} />
                  </div>
                  {lines.length > 1 && <button className="del il-del" title="Supprimer la ligne" onClick={() => removeLine(l.id)}>{Icon.trash}</button>}
                </div>
                <div className={"il-fin" + (assujetti ? "" : " no-tva")}>
                  <div className="field">
                    <label>Taux URSSAF</label>
                    <select className="cell-in" value={l.categorie} onChange={(e) => setLine(l.id, "categorie", e.target.value)}>
                      {CATS.map((c) => <option key={c} value={c}>{RATES[c].short} · {pct(RATES[c].social)}</option>)}
                    </select>
                  </div>
                  <div className="field">
                    <label>Montant HT</label>
                    <input className="cell-in" type="number" step="0.01" placeholder="0,00" value={l.montant} onChange={(e) => setLine(l.id, "montant", e.target.value)} />
                  </div>
                  {assujetti &&
                  <div className="field">
                    <label>TVA</label>
                    <select className="cell-in" value={l.tva} onChange={(e) => setLine(l.id, "tva", parseFloat(e.target.value))}>
                      {activeTvaRates.map((tv) => <option key={tv.v} value={tv.v}>{tv.label}</option>)}
                    </select>
                  </div>}
                  {assujetti &&
                  <div className="field">
                    <label>Montant TTC</label>
                    <div className="cell-in il-ttc">{eur(num(l.montant) * (1 + num(l.tva)))}</div>
                  </div>}
                </div>
              </div>
            )}
          </div>
          <button className="addrow" style={{ marginTop: 10, padding: "7px 12px", fontSize: 12.5 }} onClick={addLine}>{Icon.plus} Ajouter une ligne</button>
          <div className="inv-total">
            <span className="it-lab">Total facture</span>
            <span className="it-v">HT <b>{eur(t.ht)}</b></span>
            {assujetti && <span className="it-v">TVA {eur(t.tva)}</span>}
            {assujetti && <span className="it-v">TTC <b>{eur(t.ttc)}</b></span>}
          </div>
          <div className="inv-result">
            <div className="ir-line"><span>Cotisations URSSAF <em>estimées sur le HT réel</em></span><b className="neg">−{eur(t.urssaf)}</b></div>
            <div className="ir-line net"><span>Net estimé pour vous</span><b>{eur(t.net)}</b></div>
          </div>
        </div>
        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Annuler</button>
          <button className="btn pri" disabled={!canSave} style={{ marginLeft: "auto" }} onClick={() => onSave(draft)}>Valider</button>
        </div>
      </div>
    </div>);
}

function FacturesTab({ factures, facturesByMonth, charges, profile, mIndex, onSaveInv, onRemoveInv, onMarkPaid, urssafHistory = {}, tvaConfig }) {
  const YEAR = useYear();
  const s = computeMonth({ facturesByMonth, charges, profile, mIndex, year: YEAR, urssafHistory });
  const allClients = [...new Set(Object.values(facturesByMonth || {}).flat().map(f => f.client).filter(Boolean))].sort();
  // En attente : toutes les factures non payées, quel que soit le mois d'émission
  // (indépendant du mois sélectionné). Triées par date d'émission.
  const enAttente = Object.values(facturesByMonth || {}).flat()
    .filter((f) => !isPaid(f))
    .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  // Encaissées : factures payées dont l'encaissement (date de paiement) tombe sur le
  // mois sélectionné, quel que soit leur mois d'émission. Triées par date de paiement.
  const target = `${YEAR}-${pad2(mIndex)}`;
  const encaissees = Object.values(facturesByMonth || {}).flat()
    .filter((f) => isPaid(f) && moisEncaissement(f) === target)
    .sort((a, b) => (a.datePaiement || a.date || "").localeCompare(b.datePaiement || b.date || ""));
  // montant total des factures en attente, tous mois confondus (pour la synthèse)
  const att = totalFacturesEnAttente(facturesByMonth, profile, urssafHistory);
  const attenteMontant = att.ht;
  // modal : null = fermé ; { inv: null } = nouvelle facture ; { inv: facture } = modification
  const [modal, setModal] = React.useState(null);

  return (
    <div>
      <datalist id="mef-clients">{allClients.map(c => <option key={c} value={c} />)}</datalist>
      {(encaissees.length > 0 || attenteMontant > 0) &&
      <div className="card" style={{ marginBottom: 14 }}>
        <div className="card-h"><h2>Encaissé en {MONTHS[mIndex].toLowerCase()}</h2></div>
        <div className="card-b">
          {encaissees.length > 0 &&
          <div className="synth-fac">
            <div className="sf-row">
              <span className="sf-lab">CA encaissé</span>
              <span className="sf-val">{eur(s.caHT)}{s.assujetti && <span className="sf-u"> HT</span>}</span>
            </div>
            {s.assujetti &&
            <div className="sf-row sf-sub">
              <span></span>
              <span className="sf-u">{eur(s.caTTC)} TTC</span>
            </div>}
            <div className="sf-row" style={{ marginTop: 4 }}>
              <span className="sf-lab">
                URSSAF estimée
                <span className="itip-wrap" tabIndex={0} aria-label="Pourquoi est-ce une estimation ?">
                  <i className="itip-i" aria-hidden="true">i</i>
                  <span className="itip" role="tooltip">Estimation. Les cotisations se calculent sur ton CA HT arrondi à l'euro : le montant ne sera exact qu'une fois le CA HT du mois définitif.</span>
                </span>
              </span>
              <span className="sf-val" style={{ color: "var(--prov)" }}>− {eur(s.totalCotis)}</span>
            </div>
            <div className="sf-rule"></div>
            <div className="sf-row">
              <span className="sf-lab sf-lab--total">Net après URSSAF</span>
              <span className="sf-val sf-total"><span className="big-cit">{eur(s.caHT - s.totalCotis)}</span></span>
            </div>
          </div>}
          {attenteMontant > 0 &&
          <div className="listline" style={{ borderBottom: "none", marginTop: encaissees.length > 0 ? 14 : 0, paddingTop: encaissees.length > 0 ? 12 : 0, borderTop: encaissees.length > 0 ? "1px solid var(--line)" : "none" }}>
            <span className="lab" style={{ color: "var(--prov)" }}>En attente de paiement</span>
            <b style={{ color: "var(--prov)" }}>{eur(attenteMontant)} HT · {att.n} facture{att.n !== 1 ? "s" : ""}</b>
          </div>}
        </div>
      </div>
      }
      <button className="addrow accent" style={{ marginBottom: 14 }} onClick={() => setModal({ inv: null })}>{Icon.plus} Nouvelle facture</button>

      {/* En attente de paiement : toutes, quel que soit le mois d'émission */}
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, margin: "2px 2px 10px" }}>
        <h2 style={{ margin: 0, fontSize: 15, fontWeight: 700 }}>En attente de paiement</h2>
        <span style={{ fontSize: 12.5, color: "var(--faint)" }}>quel que soit le mois</span>
      </div>
      <div className="stack" style={{ marginBottom: 24 }}>

// tous les paiements d'un mois : charges + URSSAF + TVA + CFE, indexés par jour
function allPaymentsForMonth(m, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory, year) {
  const assujetti = !!profile.tva;
  const urssafDec = (profile.urssafDecalage === undefined || profile.urssafDecalage === "") ? 2 : num(profile.urssafDecalage);
  const tvaDec    = (profile.tvaDecalage   === undefined || profile.tvaDecalage   === "") ? 1 : num(profile.tvaDecalage);
  const urssafJour = parseInt(profile.urssafJour) || 5;
  const tvaJour    = parseInt(profile.tvaJour)    || 15;

  const byDay = {};
  let total = 0;
  const add = (day, item) => { (byDay[day] = byDay[day] || []).push(item); total += item.montant; };

  // 1. Charges (frais & achats)
  charges.forEach((ch) => {
    const imp = chargeImpact(ch, m, year);
    if (imp.decaisse > 0) {
      const day = parseInt(imp.dueDay, 10) || 1;
      add(day, { libelle: ch.libelle || "Sans libellé", montant: imp.decaisse,
                 color: PAY_COLORS.frais, type: "charge" });
    }
  });

  // 2. URSSAF (cotisations de m-urssafDec, éventuellement de l'année précédente)
  const uSrc = m - urssafDec;
  const uYr = uSrc >= 0 ? year : year - 1;
  const uMi = ((uSrc % 12) + 12) % 12;
  const sU  = computeMonth({ facturesByMonth, charges, profile, mIndex: uMi, year: uYr, cfeAnnuel, urssafHistory });
  if (sU.totalCotis > 0.005)
    add(urssafJour, { libelle: `URSSAF (activité ${MONTHS[uMi].toLowerCase()})`,
                      montant: sU.totalCotis, color: PAY_COLORS.urssaf, type: "urssaf" });

  // 3. TVA (tvaAreverser de m-tvaDec, éventuellement de l'année précédente)
  if (assujetti) {
    const tSrc = m - tvaDec;
    const tYr = tSrc >= 0 ? year : year - 1;
    const tMi = ((tSrc % 12) + 12) % 12;
    const sT  = computeMonth({ facturesByMonth, charges, profile, mIndex: tMi, year: tYr, cfeAnnuel, urssafHistory });
    if (sT.tvaAreverser > 0.005)
      add(tvaJour, { libelle: `TVA (activité ${MONTHS[tMi].toLowerCase()})`,
                     montant: sT.tvaAreverser, color: PAY_COLORS.tva, type: "tva" });
  }

  // 4. CFE (décembre uniquement)
  if (m === 11 && cfeAnnuel > 0)
    add(15, { libelle: "CFE annuelle", montant: cfeAnnuel, color: PAY_COLORS.cfe, type: "cfe" });

  return { byDay, total };
}

// ---- Calendrier complet (charges + URSSAF + TVA + CFE) ----

function FullMonthCalendar({ mIndex, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory }) {
  const YEAR = useYear();
  const { byDay, total } = allPaymentsForMonth(mIndex, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory, YEAR);
  const present = new Set();
  Object.values(byDay).forEach(arr => arr.forEach(it => present.add(it.type === "charge" ? "frais" : it.type)));
  const daysInMonth = new Date(YEAR, mIndex + 1, 0).getDate();
  const firstDow = (new Date(YEAR, mIndex, 1).getDay() + 6) % 7;
  const now = new Date();
  const isThisMonth = now.getFullYear() === YEAR && now.getMonth() === mIndex;
  const todayDate = now.getDate();
  const WD = ["dimanche", "lundi", "mardi", "mercredi", "jeudi", "vendredi", "samedi"];
  const kindOf = (it) => it.type === "charge" ? "frais" : it.type;
  const MAXCHIP = 2;

  const wrapRef = React.useRef(null);
  const [tip, setTip] = React.useState(null);
  const show = (d, items, e) => {
    const w = wrapRef.current; if (!w) return;
    const wr = w.getBoundingClientRect(), cr = e.currentTarget.getBoundingClientRect();
    const W = 208, pad = 4;
    const center = cr.left + cr.width / 2 - wr.left;
    const left = Math.max(pad, Math.min(center - W / 2, wr.width - W - pad));
    const estH = 64 + Math.min(items.length, 6) * 21;
    const below = (cr.top - wr.top) <= wr.height - estH - 20;
    const top = below ? (cr.bottom - wr.top + 9) : (cr.top - wr.top - estH - 9);
    const dayTotal = items.reduce((s, it) => s + it.montant, 0);
    const label = `${WD[new Date(YEAR, mIndex, d).getDay()]} ${d} ${MONTHS[mIndex].toLowerCase()}`;
    setTip({ day: d, left, top, arrow: Math.max(12, Math.min(center - left, W - 12)), place: below ? "below" : "above", items, dayTotal, label });
  };
  const hide = () => setTip(null);

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  return (
    <div className="cal" ref={wrapRef}>
      <div className="cal-dow">
        {["lun", "mar", "mer", "jeu", "ven", "sam", "dim"].map(d => <span key={d}>{d}</span>)}
      </div>
      <div className="cal-grid">
        {cells.map((d, i) => {
          if (d === null) return <div key={"e" + i} className="cal-cell empty" />;
          const items = byDay[d] || [];
          const today = isThisMonth && d === todayDate;
          const extra = items.length - MAXCHIP;
          return (
            <div key={d}
              className={"cal-cell" + (items.length ? " has evt" : "") + (today ? " today" : "")}
              onMouseEnter={items.length ? (e) => show(d, items, e) : undefined}
              onMouseLeave={items.length ? hide : undefined}
              onClick={items.length ? (e) => show(d, items, e) : undefined}>
              <span className="cal-cell-day">{d}</span>
              <div className="cal-chips">
                {items.slice(0, MAXCHIP).map((it, k) => (
                  <div key={k} className={"cal-chip k-" + kindOf(it)}>
                    <span className="lab">{it.libelle}</span>
                    <b>{eur0(it.montant)}</b>
                  </div>
                ))}
                {extra > 0 && <span className="cal-more">+{extra} autre{extra > 1 ? "s" : ""}</span>}
              </div>
            </div>
          );
        })}
      </div>
      {tip && (
        <div className={"cal-tip " + tip.place} style={{ left: tip.left, top: tip.top }}>
          <span className="cal-tip-arrow" style={{ left: tip.arrow }} />
          <div className="annual-tip-head">
            <span className="annual-tip-month">{tip.label}</span>
          </div>
          <div className="annual-tip-rows">
            {tip.items.map((it, k) => (
              <div className="annual-tip-row" key={k}>
                <span><i style={{ width: 9, height: 9, borderRadius: "50%", background: it.color, ...(it.color === "#ffffff" ? { boxShadow: "inset 0 0 0 1px #9bc7c1" } : {}) }} />{it.libelle}</span>
                <span className="num">{eur0(it.montant)}</span>
              </div>
            ))}
          </div>
          <div className="cal-tip-tot"><span>Total du jour</span><b>{eur0(tip.dayTotal)}</b></div>
        </div>
      )}
      <div className="cal-foot">
        <div className="cal-legend">
          {PAY_LEGEND.filter(l => present.has(l.key)).map(l =>
            <span key={l.key}><i style={{ background: l.color, ...(l.color === "#ffffff" ? { boxShadow: "inset 0 0 0 1px #9bc7c1" } : {}) }} />{l.label}</span>)}
        </div>
        <div className="cal-tot">
          {total > 0
            ? <span>Total prélevé en {MONTHS[mIndex]} · <b>{eur0(total)}</b></span>
            : <span style={{ color: "var(--soft)", fontSize: 12.5 }}>Aucun paiement ce mois.</span>}
        </div>
      </div>
    </div>
  );
}

function FullYearCalendar({ mIndex, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory }) {
  const YEAR = useYear();
  const months = MONTHS.map((name, m) => {
    const { byDay, total } = allPaymentsForMonth(m, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory, YEAR);
    const items = [];
    Object.keys(byDay).forEach(day => byDay[day].forEach(it => items.push({ ...it, day: parseInt(day, 10) })));
    items.sort((a, b) => a.day - b.day);
    return { name, m, total, items };
  });
  const yearTotal = months.reduce((s, x) => s + x.total, 0);
  const maxTotal = Math.max(1, ...months.map(x => x.total));
  const present = new Set();
  months.forEach(mo => mo.items.forEach(it => present.add(it.type === "charge" ? "frais" : it.type)));

  return (
    <div className="cal">
      <div className="cal-year">
        {months.map(mo => (
          <div key={mo.m} className={"ym" + (mo.m === mIndex ? " cur" : "")}>
            <div className="ym-h">
              <span className="nm">{mo.name}</span>
              <span className="tt">{mo.total > 0 ? eur0(mo.total) : "—"}</span>
            </div>
            <div className="ym-bar"><i style={{ width: mo.total / maxTotal * 100 + "%", background: "var(--faint)" }} /></div>
            <div className="ym-list">
              {mo.items.length === 0 && <span className="ym-empty">aucun paiement</span>}
              {mo.items.map((it, k) => (
                <div key={k} className="ym-it">
                  <span className="dd" style={{ background: it.color, ...(it.color === "#ffffff" ? { color: "#2d2b1e", boxShadow: "inset 0 0 0 1px rgba(45,43,30,.25)" } : {}) }}>{it.day}</span>
                  <span className="ll">{it.libelle}</span>
                  <span className="mm">{eur0(it.montant)}</span>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="cal-foot">
        <div className="cal-legend">
          {PAY_LEGEND.filter(l => present.has(l.key)).map(l =>
            <span key={l.key}><i style={{ background: l.color, ...(l.color === "#ffffff" ? { boxShadow: "inset 0 0 0 1px #9bc7c1" } : {}) }} />{l.label}</span>)}
        </div>
        <div className="cal-tot"><span>Total prélevé sur {YEAR} · <b>{eur0(yearTotal)}</b></span></div>
      </div>
    </div>
  );
}

function CalendarTab({ mIndex, charges, profile, cfeAnnuel, facturesByMonth, urssafHistory }) {
  const YEAR = useYear();
  const [scope, setScope] = React.useState("month");
  return (
