function TariffHistory({ charge, onAddTariff, onRemoveTariff }) {
  const hist = (charge.tarifsHistory || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
  const currentIdx = hist.reduce((best, t, i) => t.from <= TODAY ? i : best, -1);
  const currentFrom = currentIdx >= 0 ? hist[currentIdx].from : (hist[0] || {}).from;
  const currentMontant = currentIdx >= 0 ? num(hist[currentIdx].montant) : (hist[0] ? num(hist[0].montant) : 0);

  const [newFrom, setNewFrom] = React.useState("");
  const [newMontant, setNewMontant] = React.useState("");

  const dayBefore = (dateStr) => { const d = new Date(dateStr); d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10); };

  const statusOf = (from) => {
    if (from === currentFrom) return { label: "Actuel", cls: "current" };
    if (from > TODAY) return { label: "À venir", cls: "future" };
    return { label: "Passé", cls: "past" };
  };

  const pctVsPrev = (prevMontant, montant) => {
    const base = num(prevMontant);
    if (!base) return null;
    const diff = num(montant) - base;
    if (diff === 0) return null;
    const pct = Math.round(diff / base * 100);
    return { label: pct > 0 ? `+${pct}%` : `${pct}%`, cls: pct > 0 ? "up" : "down" };
  };

  return (
    <div className="tariff-panel">
      <div className="tariff-title">Historique des tarifs</div>
      <div className="tariff-list">
        {hist.map((t, i) => {
          const st = statusOf(t.from);
          const to = i + 1 < hist.length ? dayBefore(hist[i + 1].from) : null;
          const pct = (st.cls === "future" && i > 0) ? pctVsPrev(hist[i - 1].montant, t.montant) : null;
          let rangeLabel;
          if (st.cls === "past") {
            rangeLabel = `du ${fmtDateShort(t.from)} au ${fmtDateShort(to)}`;
          } else if (st.cls === "current") {
            rangeLabel = to ? `du ${fmtDateShort(t.from)} au ${fmtDateShort(to)}` : `depuis le ${fmtDateShort(t.from)}`;
          } else {
            rangeLabel = to ? `du ${fmtDateShort(t.from)} au ${fmtDateShort(to)}` : `à partir du ${fmtDateShort(t.from)}`;
          }
          return (
            <div key={t.from} className={"tariff-entry " + st.cls}>
              <span className={"tariff-status " + (st.cls === "future" ? "attn" : st.cls)}>{st.label}</span>
              <span className="tariff-from">{rangeLabel}</span>
              {pct && <span className={"tariff-pct " + pct.cls}>{pct.label}</span>}
              <b className="tariff-val">{eur(t.montant)}</b>
              {i > 0
                ? <button className="del" title="Supprimer ce tarif" onClick={() => onRemoveTariff(charge.id, t.from)}>{Icon.trash}</button>
                : <span className="del-ph" aria-hidden="true"></span>}
            </div>
          );
        })}
      </div>
      <div className="tariff-add">
        <span className="tariff-add-label">Nouveau tarif à partir du</span>
        <input type="date" className="cell-in" value={newFrom} onChange={e => setNewFrom(e.target.value)} style={{ width: 155 }} />
        <input className="cell-in num" type="number" step="0.01" placeholder="Nouveau montant"
          value={newMontant} onChange={e => setNewMontant(e.target.value)} style={{ width: 140 }} />
        <button className="btn" style={{ flex: "none" }} onClick={() => {
          if (newMontant && newFrom) { onAddTariff(charge.id, newFrom, newMontant); setNewMontant(""); }
        }}>Ajouter</button>
      </div>
    </div>
  );
}

const CAT_PALETTE = ["#5cb7b0","#80c8c0","#a7cdc6","#9aa9a4","#bcd2cc","#7f9c93","#c5cdc9","#6f9d8a"];

// Modale de création d'un frais ou d'un achat. Brouillon local : rien n'est créé tant qu'on n'a pas validé.
function FraisModal({ categories, profile, tvaConfig, charge, onSave, onUpdate, onClose }) {
  const assujetti = !!profile.tva;
  const activeTvaRates = tvaConfig || TVA_RATES;
  const isPonctuelCat = (cat) => (cat || "").toLowerCase().includes("ponctuel");
  const firstCat = categories[0] || "";
  const isEdit = !!charge;
  const [draft, setDraft] = React.useState(() => isEdit ? {
    libelle: charge.libelle || "", categorie: charge.categorie || firstCat,
    frequence: charge.frequence || "mensuelle",
    montant: tariffAt(charge, TODAY), date: charge.date || TODAY, tva: charge.tva || 0,
  } : {
    libelle: "", categorie: firstCat,
    frequence: isPonctuelCat(firstCat) ? "ponctuelle" : "mensuelle",
    montant: "", date: TODAY, tva: 0,
  });
  const setField = (f, v) => setDraft(d => ({ ...d, [f]: v }));
  const onCat = (cat) => setDraft(d => ({ ...d, categorie: cat,
    frequence: isPonctuelCat(cat) ? "ponctuelle" : (d.frequence === "ponctuelle" ? "mensuelle" : d.frequence) }));
  const isPonctuel = draft.frequence === "ponctuelle";
  const canSave = !!draft.libelle.trim();
  const save = () => {
    if (!canSave) return;
    const date = draft.date || TODAY;
    if (isEdit) {
      onUpdate(charge.id, "libelle", draft.libelle.trim());
      onUpdate(charge.id, "categorie", draft.categorie || firstCat);
      onUpdate(charge.id, "frequence", draft.frequence);
      onUpdate(charge.id, "tva", assujetti ? draft.tva : 0);
      const sorted = (charge.tarifsHistory || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
      let appIdx = sorted.reduce((best, t, i) => t.from <= TODAY ? i : best, -1);
      if (appIdx < 0) appIdx = 0;
      const newHist = sorted.length
        ? sorted.map((t, i) => i === appIdx ? { ...t, montant: draft.montant } : t)
        : [{ montant: draft.montant, from: date }];
      onUpdate(charge.id, "tarifsHistory", newHist);
      onUpdate(charge.id, "date", date);
      onClose();
    } else {
      onSave({
        id: uid(), libelle: draft.libelle.trim(), montant: "",
        categorie: draft.categorie || firstCat,
        tarifsHistory: [{ montant: draft.montant, from: date }],
        frequence: draft.frequence,
        jour: parseInt(date.slice(8, 10), 10) || 1,
        date, tva: assujetti ? draft.tva : 0,
      });
    }
  };
  return (
    <div className="scrim" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ width: "min(560px, 100%)" }}>
        <div className="modal-h">
          <h3>{isEdit ? "Modifier le frais" : "Nouveau frais ou achat"}</h3>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          <div className="field">
            <label>Libellé</label>
            <input className={"in" + (!draft.libelle.trim() ? " field-missing" : "")} placeholder="Ex : Assurance RC pro"
              value={draft.libelle} onChange={(e) => setField("libelle", e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && save()} autoFocus />
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <div className="field" style={{ flex: 1, minWidth: 200 }}>
              <label>Catégorie</label>
              <select className="in" value={draft.categorie} onChange={(e) => onCat(e.target.value)}>
                {categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div className="field" style={{ flex: 1, minWidth: 200 }}>
              <label>Fréquence</label>
              <select className="in" value={draft.frequence} onChange={(e) => setField("frequence", e.target.value)}>
                <option value="mensuelle">Mensuelle</option>
                <option value="trimestrielle">Trimestrielle</option>
                <option value="annuelle">Annuelle</option>
                <option value="ponctuelle">Achat ponctuel</option>
              </select>
            </div>
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap" }}>
            <div className="field" style={{ flex: 1, minWidth: 150 }}>
              <label>Montant (€)</label>
              <input className="in" type="number" step="0.01" placeholder="0,00"
                value={draft.montant} onChange={(e) => setField("montant", e.target.value)} />
            </div>
            <div className="field" style={{ flex: 1, minWidth: 150 }}>
              <label>{isPonctuel ? "Date de l'achat" : "Depuis le"}</label>
              <input className="in" type="date" value={draft.date} onChange={(e) => setField("date", e.target.value)} />
            </div>
            {assujetti &&
              <div className="field" style={{ flex: 1, minWidth: 130 }}>
                <label>TVA</label>
                <select className="in" value={draft.tva} onChange={(e) => setField("tva", parseFloat(e.target.value))}>
                  {activeTvaRates.map(tv => <option key={tv.v} value={tv.v}>TVA {tv.label}</option>)}
                </select>
              </div>
            }
          </div>
        </div>
        <div className="modal-f">
          <button className="btn ghost" onClick={onClose}>Annuler</button>
          <button className="btn pri" disabled={!canSave} style={{ marginLeft: "auto" }} onClick={save}>{isEdit ? "Enregistrer" : "Valider"}</button>
        </div>
      </div>
    </div>);
}

function FraisTab({ charges, mIndex, categories, profile, onAdd, onCreate, onUpdate, onRemove, onAddTariff, onRemoveTariff, onAddCategory, onRemoveCategory, onMoveCategory, tvaConfig }) {
  const YEAR = useYear();
  const activeTvaRates = tvaConfig || TVA_RATES;
  const [tarifsOpen, setTarifsOpen] = React.useState({});
  const [modal, setModal] = React.useState(null);
  const [newCat, setNewCat] = React.useState("");
  const [groupBy, setGroupBy] = React.useState("cat");
  const [catModalOpen, setCatModalOpen] = React.useState(false);
  const [hideEmpty, setHideEmpty] = React.useState(() => load("mef2:frais_hide_empty", false));
  React.useEffect(() => save("mef2:frais_hide_empty", hideEmpty), [hideEmpty]);
  const toggleTarifs = (id) => setTarifsOpen(o => ({ ...o, [id]: !o[id] }));
  const freqLabels = { mensuelle: "Mensuel", trimestrielle: "Trimestriel", annuelle: "Annuel", ponctuelle: "Ponctuel" };
  const PERIODE = { mensuelle: "/mois", trimestrielle: "/trim", annuelle: "/an", ponctuelle: "" };
  const FREQ_ORDER = ["mensuelle", "trimestrielle", "annuelle", "ponctuelle"];

  const renderRow = (ch) => {
    const imp = chargeImpact(ch, mIndex, YEAR);
    const isPonctuel = ch.frequence === "ponctuelle";
    const hasFuture = (ch.tarifsHistory || []).some(t => t.from > TODAY);
    const nextLabel = isPonctuel ? "" : `prochain prélèvement le ${fmtDate(nextDebitDate(ch))}`;
    // tarif en vigueur sur le mois affiché + infobulle d'historique des tarifs
    const tarifMois = tariffForMonth(ch, mIndex, YEAR);
    const histSorted = (ch.tarifsHistory || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
    const histTip = histSorted.length
      ? "Historique des tarifs\n" + histSorted.map(t => `depuis ${new Date(t.from + "T00:00:00").toLocaleDateString("fr-FR")} : ${eur(num(t.montant))}`).join("\n")
      : `Tarif : ${eur(num(ch.montant))}`;
    const startLabel = ch.date ? `${MONTHS[parseInt(ch.date.slice(5, 7), 10) - 1].toLowerCase()} ${ch.date.slice(0, 4)}` : "";
    return (
      <React.Fragment key={ch.id}>
        <tr style={imp.active ? null : { opacity: .55 }}>
          <td><span style={{ fontWeight: 500 }}>{ch.libelle || <em style={{ color: "var(--faint)", fontWeight: 400 }}>Sans libellé</em>}</span></td>
          <td><span className="badge cat" style={{ fontSize: 11 }}>{freqLabels[ch.frequence] || ch.frequence}</span></td>
          <td className="num">
            <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
              <span className="itip-wrap" tabIndex={0}>
                <span className="prix-ttc">{eur(tarifMois)}{PERIODE[ch.frequence] && <span style={{ color: "var(--faint)", fontWeight: 400 }}>{PERIODE[ch.frequence]}</span>}</span>
                <span className="itip itip--right itip--pre" role="tooltip">{histTip}</span>
              </span>
              {!isPonctuel &&
                <button className={"tariff-btn" + (tarifsOpen[ch.id] ? " on" : "") + (hasFuture ? " pending" : "")}
                  title={hasFuture ? "Changement de tarif à venir" : "Historique des tarifs et date de début"}
                  onClick={() => toggleTarifs(ch.id)}>{Icon.clock}</button>}
            </div>
          </td>
          <td className="num">
            {!imp.active
              ? <span className="itip-wrap" tabIndex={0}>
                  <span className="ce-mois" style={{ color: "var(--faint)" }}>{eur0(0)}</span>
                  <span className="itip itip--right itip--sm" role="tooltip">{startLabel ? `Pas encore actif · démarre en ${startLabel}` : "Pas encore actif"}</span>
                </span>
              : imp.decaisse > 0
                ? <span className="itip-wrap" tabIndex={0}>
                    <span className="ce-mois ce-mois--out">{Icon.down}prélevé · {eur0(imp.decaisse)}</span>
                    <span className="itip itip--right itip--sm" role="tooltip">{`prélevé le ${parseInt(imp.dueDay, 10)} ${MONTHS[mIndex].toLowerCase()}`}</span>
                  </span>
                : <span className="itip-wrap" tabIndex={0}>
                    <span className="ce-mois prix-ttc--prov">{Icon.clock}provision · {eur0(imp.provision)}</span>
                    <span className="itip itip--right itip--sm" role="tooltip">{nextLabel || "provision mise de côté ce mois"}</span>
                  </span>}
          </td>
          <td className="c" style={{ whiteSpace: "nowrap" }}>
            <div style={{ display: "flex", gap: 4, justifyContent: "flex-end" }}>
              <button className="del" title="Modifier" onClick={() => setModal({ charge: ch })}>{Icon.pencil}</button>
              <button className="del" title="Supprimer" onClick={() => onRemove(ch.id)}>{Icon.trash}</button>
            </div>
          </td>
        </tr>
        {!isPonctuel && tarifsOpen[ch.id] && (
          <tr key={ch.id + "-t"}>
            <td colSpan={5} style={{ padding: "0 14px 14px", background: "#f7f7f3", borderBottom: "1px solid var(--line)" }}>
              <TariffHistory charge={ch} onAddTariff={onAddTariff} onRemoveTariff={onRemoveTariff} />
            </td>
          </tr>
        )}
      </React.Fragment>
    );
  };

  // un achat ponctuel n'apparaît que dans son mois d'achat ; les récurrentes sont toujours listées
  const isVisible = (ch) => {
    if (ch.frequence !== "ponctuelle") return true;
    const d = ch.date || "";
    const startMonth = d ? (parseInt(d.slice(5, 7), 10) - 1) : 0;
    const startYear = d ? parseInt(d.slice(0, 4), 10) : YEAR;
    return startYear === YEAR && startMonth === mIndex;
  };
  const visibleCharges = charges.filter(isVisible);

  const grandTotal = visibleCharges.reduce((sum, ch) => {
    const imp = chargeImpact(ch, mIndex, YEAR);
    return sum + (imp.active ? imp.decaisse + imp.provision : 0);
  }, 0);
  const uncategorized = visibleCharges.filter(ch => !categories.includes(ch.categorie));

  const splitFor = (list) => list.reduce((acc, ch) => {
    const imp = chargeImpact(ch, mIndex, YEAR);
    if (imp.active) { acc.dec += imp.decaisse; acc.prov += imp.provision; }
    return acc;
  }, { dec: 0, prov: 0 });

  const groups = groupBy === "freq"
    ? FREQ_ORDER.map(f => ({ key: f, label: freqLabels[f], items: visibleCharges.filter(ch => ch.frequence === f) })).filter(g => g.items.length)
    : [
        ...categories.map(cat => ({ key: cat, label: cat, items: visibleCharges.filter(ch => ch.categorie === cat) })),
        ...(uncategorized.length ? [{ key: "__uncat", label: "Sans catégorie", items: uncategorized }] : []),
      ].filter(g => !hideEmpty || g.items.length > 0);
  const catSplit = groups
    .map((g, i) => ({ cat: g.label, color: g.key === "__uncat" ? "#b8bab2" : CAT_PALETTE[i % CAT_PALETTE.length], ...splitFor(g.items) }))
    .filter(r => r.dec + r.prov > 0);
  const totalDec = catSplit.reduce((s, r) => s + r.dec, 0);
  const totalProv = catSplit.reduce((s, r) => s + r.prov, 0);
  const barDenom = grandTotal || 1;
  // répartition par catégorie (toujours par catégorie, indépendant du toggle) pour la barre type tableau de bord
  const catShares = [
    ...categories.map((cat, i) => { const list = visibleCharges.filter(ch => ch.categorie === cat); const s = splitFor(list); return { label: cat, color: CAT_PALETTE[i % CAT_PALETTE.length], val: s.dec + s.prov, count: list.filter(ch => chargeImpact(ch, mIndex, YEAR).active).length }; }),
    ...(uncategorized.length ? [(() => { const list = uncategorized; const s = splitFor(list); return { label: "Sans catégorie", color: "#b8bab2", val: s.dec + s.prov, count: list.filter(ch => chargeImpact(ch, mIndex, YEAR).active).length }; })()] : []),
  ].filter(r => r.val > 0);
  const spendSegs = catShares.map(d => ({ key: d.label, lab: d.label, val: d.val, color: d.color, note: `${d.count} frais ce mois` }));

  return (
    <div className="card">
      <div className="card-b">
        <div className="frais-head">
          <div className="frais-head-spend">
            <SpendBar segs={spendSegs} total={grandTotal} signed={false} pctLabel="du total" />
          </div>
          <div className="frais-head-total">
            <span className="lab">Total · {MONTHS[mIndex]}</span>
            <span className="val">{eur0(grandTotal)}</span>
            <div className="frais-natnums">
              <span className="fnn">Payé ce mois <b>{eur0(totalDec)}</b></span>
              <span className="fnn">À mettre de côté <b>{eur0(totalProv)}</b></span>
            </div>
          </div>
        </div>
        <button className="addrow accent" style={{ marginBottom: 14 }} onClick={() => setModal({})}>{Icon.plus} Ajouter un frais</button>
        {modal && <FraisModal categories={categories} profile={profile} tvaConfig={tvaConfig} charge={modal.charge}
          onSave={(charge) => { onCreate(charge); setModal(null); }}
          onUpdate={onUpdate}
          onClose={() => setModal(null)} />}
        <React.Fragment>
          <div className="frais-toolbar">
            <span className="frais-toolbar-lab">Grouper par</span>
            <div className="viewseg sm">
              <button className={groupBy === "cat" ? "on" : ""} onClick={() => setGroupBy("cat")}>Catégorie</button>
              <button className={groupBy === "freq" ? "on" : ""} onClick={() => setGroupBy("freq")}>Fréquence</button>
            </div>
            {groupBy === "cat" && (
              <div className="frais-hide-empty" onClick={() => setHideEmpty(v => !v)} title="Masquer les catégories sans frais ce mois">
                <span>Masquer les vides</span>
                <button className={"sw" + (hideEmpty ? " on" : "")} tabIndex={-1} aria-hidden="true"></button>
              </div>
            )}
            <button className="btn cat-manage-btn" style={{ marginLeft: "auto" }} onClick={() => setCatModalOpen(true)}>{Icon.tag} Gérer les catégories</button>
          </div>
          <table className="tbl frais-tbl">
            <thead>
              <tr>
                <th>Libellé</th>
                <th style={{ width: 120 }}>Fréquence</th>
                <th className="r" style={{ width: 150 }}>Montant TTC</th>
                <th className="r" style={{ width: 170 }}>Ce mois</th>
                <th style={{ width: 72 }}></th>
              </tr>
            </thead>
            <tbody>
              {groups.map(g => {
                const gTotal = g.items.reduce((sum, ch) => {
                  const imp = chargeImpact(ch, mIndex, YEAR);
                  return sum + (imp.active ? imp.decaisse + imp.provision : 0);
                }, 0);
                return (
                  <React.Fragment key={g.key}>
                    <tr className="cat-group-hd"><td colSpan={5}>
                      <div className="cat-group-inner">
                        <span className="cat-group-lab">{g.label}</span>
                        <span className="cat-group-sub">{g.items.length} frais · sous-total <b>{eur(gTotal)}</b></span>
                      </div>
                    </td></tr>
                    {g.items.length === 0 && (
                      <tr className="frais-empty"><td colSpan={5}>Aucun frais dans cette catégorie</td></tr>
                    )}
                    {g.items.map(renderRow)}
                  </React.Fragment>
                );
              })}
              <tr className="grand-total-row">
                <td colSpan={5}>Total frais — {MONTHS[mIndex]} <span className="total-val">{eur(grandTotal)}</span></td>
              </tr>
            </tbody>
          </table>

          {catModalOpen && (
            <div className="scrim" onMouseDown={(e) => e.target === e.currentTarget && setCatModalOpen(false)}>
              <div className="modal" style={{ width: "min(480px, 100%)" }}>
                <div className="modal-h">
                  <h3>Gérer les catégories</h3>
                  <button className="x" onClick={() => setCatModalOpen(false)}>✕</button>
                </div>
                <div className="modal-b">
                  <div className="cat-list">
                    {categories.map((c, i) => {
                      const count = charges.filter(ch => ch.categorie === c).length;
                      const canDelete = count === 0 && categories.length > 1;
                      return (
                        <div key={c} className="cat-row">
                          <span className="cat-move">
                            <button className="cat-move-btn" title="Monter" disabled={i === 0} onClick={() => onMoveCategory(c, -1)}>{Icon.chevUp}</button>
                            <button className="cat-move-btn" title="Descendre" disabled={i === categories.length - 1} onClick={() => onMoveCategory(c, 1)}>{Icon.chevDown}</button>
                          </span>
                          <span className="cat-name">{c}</span>
                          <span className="cat-chip-count">{count}</span>
                          {canDelete
                            ? <button className="xbtn" title="Supprimer cette catégorie" onClick={() => onRemoveCategory(c)}>×</button>
                            : <span className="cat-chip-lock" title={count > 0
                                ? `Impossible de supprimer : ${count} frais ${count > 1 ? "utilisent" : "utilise"} cette catégorie. Réaffecte-${count > 1 ? "les" : "le"} d'abord via le crayon.`
                                : "Au moins une catégorie est nécessaire."}>{Icon.lock}</span>}
                        </div>
                      );
                    })}
                  </div>
                  <div className="cat-add-row" style={{ marginTop: 12 }}>
                    <input className="cell-in" placeholder="Nouvelle catégorie…" value={newCat}
                      onChange={e => setNewCat(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter" && newCat.trim()) { onAddCategory(newCat.trim()); setNewCat(""); } }}
                      style={{ flex: 1 }} />
                    <button className="btn" onClick={() => { if (newCat.trim()) { onAddCategory(newCat.trim()); setNewCat(""); } }}>Ajouter</button>
                  </div>
                  <div className="hint" style={{ marginTop: 12 }}>
                    Les flèches ↑↓ changent l'ordre des catégories : il s'applique au tableau, à la barre de répartition et au menu d'un frais.
                    Une catégorie ne peut être supprimée que si elle ne contient aucun frais. Le compteur indique le nombre de frais rattachés.
                  </div>
                </div>
                <div className="modal-f">
                  <button className="btn pri" style={{ marginLeft: "auto" }} onClick={() => setCatModalOpen(false)}>Fermer</button>
                </div>
              </div>
            </div>
          )}

          <div className="hint" style={{ marginTop: 14 }}>
            Cliquez sur le <b>crayon</b> pour modifier un frais (libellé, montant, catégorie, fréquence, date de début).
            Une charge <b>trimestrielle</b> / <b>annuelle</b> est <i>décaissée</i> le mois de son échéance ; les autres mois, une <i>provision</i> est mise de côté.
            Le bouton <b>horloge</b> affiche la date de début et l'historique des tarifs, et permet d'enregistrer un changement de tarif futur.
          </div>
        </React.Fragment>
      </div>
    </div>);

}

function Section({ title, amount, open, onToggle, children }) {
  return (
    <div className="acc">
      <div className="acc-h" onClick={onToggle}>
        <span className={"car" + (open ? " open" : "")}>{Icon.car}</span>
        <span className="ttl">{title}</span>
        {amount != null && <span className="amt">{eur(amount)}</span>}
      </div>
      {open && <div className="acc-b">{children}</div>}

}

const FRAIS_CAT_REMAP = { "Abonnements": "Logiciels & abonnements en ligne", "Achats ponctuels": "Matériel & équipement" };
function migrateCharges(charges) {
  const fix = (f) => (typeof f === "string" && f.length === 7) ? f + "-01" : f; // "2026-07" -> "2026-07-01"
  return charges.map(c => {
    let r = c;
    if (!r.tarifsHistory || r.tarifsHistory.length === 0) {
      const from = r.date || `${REAL_YEAR}-01-01`;
      r = { ...r, tarifsHistory: [{ montant: r.montant, from }] };
    } else {
      r = { ...r, tarifsHistory: r.tarifsHistory.map(t => ({ ...t, from: fix(t.from) })) };
    }
    if (!r.categorie) r = { ...r, categorie: "Charges de fonctionnement" };
    else if (FRAIS_CAT_REMAP[r.categorie]) r = { ...r, categorie: FRAIS_CAT_REMAP[r.categorie] };
    if (r.tva === undefined) r = { ...r, tva: 0 };
    return r;
  });
}

function App() {
  const [profile, setProfile] = React.useState(() => load("mef2:profile", DEFAULT_PROFILE));

  const [previsions, setPrevisions] = React.useState(() => load("mef2:previsions", SEED_PREVISIONS));
  const [charges, setCharges] = React.useState(() => migrateCharges(load("mef2:charges", SEED_CHARGES)));
  const [ui, setUi] = React.useState(() => load("mef2:ui", { tab: "dashboard", month: 3, year: REAL_YEAR }));
  const [profileOpen, setProfileOpen] = React.useState(false);
  const [navOpen, setNavOpen] = React.useState(false);
  const navRef = React.useRef(null);
  React.useEffect(() => {
    if (!navOpen) return;
    const onDoc = (e) => { if (navRef.current && !navRef.current.contains(e.target)) setNavOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [navOpen]);
  const [urssafHistory, setUrssafHistory] = React.useState(() => load("mef2:urssaf_history", {
    "BIC_VENTE":  [{ from: "2026-01-01", social: 0.123, lib: 0.010 }],
    "BIC_PRESTA": [{ from: "2026-01-01", social: 0.212, lib: 0.017 }],
    "BNC":        [{ from: "2026-01-01", social: 0.261, lib: 0.022 }],
    "BNC_CIPAV":  [{ from: "2026-01-01", social: 0.232, lib: 0.022 }],
  }));
  const [tvaConfig, setTvaConfig] = React.useState(() => load("mef2:tva_config", [
    { v: 0,    label: "0 %" },
    { v: 0.10, label: "10 %" },
    { v: 0.20, label: "20 %" },
  ]));

  React.useEffect(() => save("mef2:profile", profile), [profile]);
  React.useEffect(() => save("mef2:factures", facturesByMonth), [facturesByMonth]);
  React.useEffect(() => save("mef2:previsions", previsions), [previsions]);
  React.useEffect(() => save("mef2:charges", charges), [charges]);
  React.useEffect(() => save("mef2:ui", ui), [ui]);
  React.useEffect(() => save("mef2:urssaf_history", urssafHistory), [urssafHistory]);
  React.useEffect(() => save("mef2:tva_config", tvaConfig), [tvaConfig]);

  const DEFAULT_CATEGORIES = ["Logiciels & abonnements en ligne", "Matériel & équipement", "Assurances & frais bancaires", "Marketing & communication", "Déplacements", "Télécom & internet", "Loyer & local", "Charges de fonctionnement"];
  const [categories, setCategories] = React.useState(() => {
    const stored = load("mef2:categories", null);
    if (stored === null) return DEFAULT_CATEGORIES;
    if (load("mef2:cat_v2", false)) return stored;          // migration déjà faite
    const merged = [...DEFAULT_CATEGORIES];                  // une seule fois : remap + fusion non destructive
    stored.forEach(c => { const r = FRAIS_CAT_REMAP[c] || c; if (!merged.includes(r)) merged.push(r); });
    save("mef2:cat_v2", true);
    return merged;
  });
  React.useEffect(() => save("mef2:categories", categories), [categories]);
  const addCategory = (name) => { const n = name.trim(); if (n && !categories.includes(n)) setCategories(c => [...c, n]); };
  const removeCategory = (name) => {
    if (categories.length <= 1) return;
    if (charges.some(ch => ch.categorie === name)) return;   // catégorie non vide : suppression interdite
    setCategories(c => c.filter(x => x !== name));
  };
  const moveCategory = (name, dir) => {                       // dir = -1 (monter) ou +1 (descendre)
    setCategories(c => {
      const i = c.indexOf(name);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= c.length) return c;
      const next = [...c];
      [next[i], next[j]] = [next[j], next[i]];
      return next;
    });
  };

  const m = ui.month;
  const YEAR = ui.year || REAL_YEAR;
  const key = monthKey(YEAR, m);
  const factures = facturesByMonth[key] || [];

  // ----- factures (invoices w/ lines) -----
  // Supprime une facture quel que soit son mois (l'onglet Factures affiche désormais
  // des factures de plusieurs mois : en attente tous mois + encaissées du mois courant).
  const removeInv = (id) => setFB((p) => {
    const next = {};
    for (const k of Object.keys(p)) next[k] = (p[k] || []).filter((f) => f.id !== id);
    return next;
  });
  // Enregistre une facture (création ou modification) dans le bucket du mois de sa date.
  // Gère le changement de mois : la facture est retirée de tout autre bucket.
  const saveInv = (inv) => setFB((p) => {
    const targetKey = (inv.date && inv.date.slice(0, 7)) || key;
    const next = {};
    for (const k of Object.keys(p)) next[k] = (p[k] || []).filter((f) => f.id !== inv.id);
    const existedHere = (p[targetKey] || []).some((f) => f.id === inv.id);
    next[targetKey] = existedHere
      ? (p[targetKey] || []).map((f) => (f.id === inv.id ? inv : f))
      : [...(next[targetKey] || []), inv];
    return next;
  });
  // Marque une facture comme payée (tous mois confondus) ; date d'encaissement choisie (défaut aujourd'hui).
  const markFactPaid = (id, date) => setFB((p) => {
    const next = {};
    for (const k of Object.keys(p)) next[k] = (p[k] || []).map((f) => f.id === id ? { ...f, statut: "paye", datePaiement: date || TODAY } : f);
    return next;
  });

  // ----- prévisionnel (revenus à venir) -----
  const addPrevision = (pv) => setPrevisions((prev) => [...prev, { ...pv, id: uid(), encaissees: [] }]);
  const updatePrevision = (id, pv) => setPrevisions((prev) => prev.map((x) => x.id === id ? { ...x, ...pv } : x));
  const removePrevision = (id) => setPrevisions((prev) => prev.filter((x) => x.id !== id));
  // Convertit une prévision en facture : la modale (InvoiceModal) fournit la facture éditée (draft),
  // qu'on enregistre via saveInv (statut/date issus de la modale). Puis effet sur la prévision :
  // ponctuelle -> supprimée ; mensuelle -> conservée, le mois de la facture est marqué encaissé.
  const convertPrevision = (draft, pv) => {
    saveInv(draft);
    if (pv.recurrence === "mensuelle") {
      const mois = (draft.date || TODAY).slice(0, 7);
      setPrevisions((prev) => prev.map((x) => x.id === pv.id
        ? { ...x, encaissees: [...(x.encaissees || []), mois] } : x));
    } else {
      setPrevisions((prev) => prev.filter((x) => x.id !== pv.id));
    }
  };

  // ----- frais (charges récurrentes, liste globale) -----
  const addCharge = (cat, libelle, ponctuel) => {
    const from = TODAY;
    const jourFromDate = parseInt(from.slice(8, 10), 10) || 1;
    setCharges(prev => [...prev, { id: uid(), libelle: libelle || "", montant: "", categorie: cat || categories[0] || "", tarifsHistory: [{ montant: "", from }], frequence: ponctuel ? "ponctuelle" : "mensuelle", jour: jourFromDate, date: from, tva: 0 }]);
  };
  const addChargeFull = (charge) => setCharges(prev => [...prev, charge]);
  const updateCharge = (id, field, val) => setCharges(prev => prev.map((c) => {
    if (c.id !== id) return c;
    const updated = { ...c, [field]: val };
    if (field === "date" && updated.tarifsHistory && updated.tarifsHistory.length > 0) {
      updated.jour = parseInt(val.slice(8, 10), 10) || 1;
      const hist = updated.tarifsHistory.slice().sort((a, b) => a.from < b.from ? -1 : 1);
      hist[0] = { ...hist[0], from: val };
      updated.tarifsHistory = hist;
    }
    return updated;
  }));
  const removeCharge = (id) => setCharges(charges.filter((c) => c.id !== id));
  const addTariff = (id, from, montant) => setCharges(charges.map(c => c.id === id
    ? { ...c, tarifsHistory: [...(c.tarifsHistory || []).filter(t => t.from !== from), { from, montant }].sort((a, b) => a.from < b.from ? -1 : 1) }
    : c));
  const removeTariff = (id, from) => setCharges(charges.map(c => c.id === id
    ? { ...c, tarifsHistory: (c.tarifsHistory || []).filter(t => t.from !== from) }
    : c));

  // ----- CFE -----
  const [cfeData, setCfeData] = React.useState(() => load("mef2:cfe", {}));
  React.useEffect(() => save("mef2:cfe", cfeData), [cfeData]);
  const updateCfe = (field, val) => setCfeData(prev => ({ ...prev, [YEAR]: { ...(prev[YEAR] || {}), [field]: val } }));
  const cfeAnnuel = num((cfeData[YEAR] || {}).montant) || 0;

  // ----- nav -----
  const MONTHS_SHORT = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
  const goMonth = (delta) => setUi((u) => {
    let month = u.month + delta;
    let year = u.year || REAL_YEAR;
    if (month < 0) { month = 11; year -= 1; }
    if (month > 11) { month = 0; year += 1; }
    return { ...u, month, year };
  });
  const goYear = (delta) => setUi((u) => ({ ...u, year: (u.year || REAL_YEAR) + delta }));
  const goToday = () => setUi((u) => ({ ...u, year: REAL_YEAR, month: new Date().getMonth() }));
  const setTab = (tab) => setUi((u) => ({ ...u, tab }));

  // ----- export / import -----
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify({ version: 2, profile, facturesByMonth, previsions, charges, cfe: cfeData, urssafHistory, tvaConfig }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `microcompte-${YEAR}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d.profile) setProfile(d.profile);
        if (d.facturesByMonth) setFB(d.facturesByMonth);
        if (d.previsions) setPrevisions(d.previsions);
        if (d.charges) setCharges(d.charges);
        if (d.cfe) setCfeData(d.cfe);
        if (d.urssafHistory) setUrssafHistory(d.urssafHistory);
        if (d.tvaConfig) setTvaConfig(d.tvaConfig);
        alert("Données importées avec succès.");
      } catch (err) { alert("Fichier invalide."); }
    };
    r.readAsText(file);
    e.target.value = "";
  };

  const initiales = (profile.nom || "ME").trim().split(/\s+/).map((w) => w[0]).slice(0, 2).join("").toUpperCase() || "ME";

  const TABS = [
    ["dashboard",    "Tableau de bord",                TabIcon.dashboard],
    ["factures",     "Factures",                       TabIcon.factures],
    ["previsionnel", "Prévisionnel",                   TabIcon.previsionnel],
    ["frais",        "Frais et achats",                TabIcon.frais],
    ["prov",         "Impôts & déclarations mensuelles", TabIcon.prov],
    ["calendrier",   "Calendrier",                     TabIcon.calendrier],
  ];

  return (
    <YearCtx.Provider value={YEAR}>
    <div className="app tk" data-accent="citron">
      <div className="appbar">
        <div className="logo">
          <div className="mk">€</div>
          <div>
            <div className="nm">MicroCompte</div>
            <div className="yr">Micro-entreprise · {YEAR} · v2</div>
          </div>
        </div>
        <div className="spacer"></div>
        <button className="who" onClick={() => setProfileOpen(true)}>
          <span className="ava">{initiales}</span>
          {profile.nom || "Mon profil"}
          <svg className="gear" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1l-.3-2.6h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/></svg>
        </button>
      </div>

      <div className="tabs">
        {TABS.map(([k, lab, ic]) => (
          <button key={k} className={"tab" + (ui.tab === k ? " on" : "")} onClick={() => setTab(k)}>{ic} {lab}</button>
        ))}
      </div>

      <div className="monthnav">
        <button className="mbtn" onClick={() => goMonth(-1)} title="Mois précédent">{Chev("M15 18l-6-6 6-6")}</button>
        <div className="datepick-wrap" ref={navRef}>
          <button className={"datepick" + (navOpen ? " on" : "")} onClick={() => setNavOpen((o) => !o)}>
            <svg className="dp-cal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2" /><path d="M3 9h18M8 3v3M16 3v3" /></svg>
            {MONTHS[m]} {YEAR}
          </button>
          {navOpen &&
            <div className="navpop">
              <div className="navpop-head">
                <button className="mbtn sm" onClick={() => goYear(-1)} title="Année précédente">{Chev("M15 18l-6-6 6-6")}</button>
                <span className="navpop-y">{YEAR}</span>
                <button className="mbtn sm" onClick={() => goYear(1)} title="Année suivante">{Chev("M9 18l6-6-6-6")}</button>
              </div>
              <div className="mgrid">
                {MONTHS_SHORT.map((mo, i) => (
                  <button key={i} className={"mcell" + (i === m ? " on" : "")}
                    onClick={() => { setUi((u) => ({ ...u, month: i })); setNavOpen(false); }}>{mo}</button>
                ))}
              </div>
            </div>}
        </div>
        <button className="mbtn" onClick={() => goMonth(1)} title="Mois suivant">{Chev("M9 18l6-6-6-6")}</button>
        {!(YEAR === REAL_YEAR && m === new Date().getMonth()) &&
          <button className="today" onClick={goToday}>Aujourd'hui</button>}
      </div>

      {ui.tab === "dashboard" && <DashboardTab facturesByMonth={facturesByMonth} factures={factures} previsions={previsions} charges={charges} profile={profile} mIndex={m} cfeAnnuel={cfeAnnuel} cfeValide={!!(cfeData[YEAR] || {}).valide} cfeData={cfeData} urssafHistory={urssafHistory} onGoTo={setTab} />}
      {ui.tab === "factures" && <FacturesTab factures={factures} facturesByMonth={facturesByMonth} charges={charges} profile={profile} mIndex={m}
        onSaveInv={saveInv} onRemoveInv={removeInv} onMarkPaid={markFactPaid} urssafHistory={urssafHistory} tvaConfig={tvaConfig} />}
      {ui.tab === "previsionnel" && <PrevisionnelTab previsions={previsions} facturesByMonth={facturesByMonth} profile={profile}
        onAddPrevision={addPrevision} onUpdatePrevision={updatePrevision} onRemovePrevision={removePrevision} onConvert={convertPrevision} onMarkPaid={markFactPaid} urssafHistory={urssafHistory} tvaConfig={tvaConfig} />}
      {ui.tab === "frais" && <FraisTab charges={charges} mIndex={m} categories={categories} profile={profile} onAdd={addCharge} onCreate={addChargeFull} onUpdate={updateCharge} onRemove={removeCharge} onAddTariff={addTariff} onRemoveTariff={removeTariff} onAddCategory={addCategory} onRemoveCategory={removeCategory} onMoveCategory={moveCategory} tvaConfig={tvaConfig} />}
      {ui.tab === "prov" && <ChargesProvisionsTab factures={factures} facturesByMonth={facturesByMonth} charges={charges} profile={profile} mIndex={m} cfeData={cfeData[YEAR] || {}} onUpdateCfe={updateCfe} urssafHistory={urssafHistory} />}
      {ui.tab === "calendrier" && <CalendarTab mIndex={m} charges={charges} profile={profile} cfeAnnuel={cfeAnnuel} facturesByMonth={facturesByMonth} urssafHistory={urssafHistory} />}

      {profileOpen && <ProfileModal profile={profile} setProfile={setProfile} onClose={() => setProfileOpen(false)} onExport={exportJSON} onImport={importJSON} urssafHistory={urssafHistory} setUrssafHistory={setUrssafHistory} tvaConfig={tvaConfig} setTvaConfig={setTvaConfig} />}
    </div>
    </YearCtx.Provider>
  );
}

function ProfileModal({ profile, setProfile, onClose, onExport, onImport, urssafHistory, setUrssafHistory, tvaConfig, setTvaConfig }) {
  const YEAR = useYear();
  const up = (field, val) => setProfile({ ...profile, [field]: val });
  const prev = (profile.prevYears || {})[YEAR - 1] || {};
  const upPrev = (field, val) => setProfile(p => ({
    ...p,
    prevYears: { ...(p.prevYears || {}), [YEAR - 1]: { ...((p.prevYears || {})[YEAR - 1] || {}), [field]: num(val) } }
  }));
  const fileRef = React.useRef(null);

  const [addingUrssaf, setAddingUrssaf] = React.useState(false);
  const [urssafForm, setUrssafForm] = React.useState({
    from: `${YEAR + 1}-01-01`,
    rates: Object.fromEntries(CATS_META.map(m => [m.key, { social: "", lib: "" }])),
  });
  const [showUrssafHistory, setShowUrssafHistory] = React.useState(false);
  const currentRateFor = (cat) => {
    const hist = ((urssafHistory || {})[cat] || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
    return hist.length > 0 ? hist[hist.length - 1] : null;
  };
  const saveUrssafEntry = () => {
    const newHistory = { ...(urssafHistory || {}) };
    CATS_META.forEach(m => {
      const s = parseFloat(urssafForm.rates[m.key].social) / 100;
      const l = parseFloat(urssafForm.rates[m.key].lib) / 100;
      if (!isNaN(s) && s > 0) {
        const existing = (newHistory[m.key] || []).filter(e => e.from !== urssafForm.from);
        newHistory[m.key] = [...existing, { from: urssafForm.from, social: s, lib: isNaN(l) ? 0 : l }]
          .sort((a, b) => a.from < b.from ? -1 : 1);
      }
    });
    setUrssafHistory(newHistory);
    setAddingUrssaf(false);
    setUrssafForm({ from: `${YEAR + 1}-01-01`, rates: Object.fromEntries(CATS_META.map(m => [m.key, { social: "", lib: "" }])) });
  };
  const deleteUrssafEntry = (cat, from) => {
    const hist = ((urssafHistory || {})[cat] || []).filter(e => e.from !== from);
    setUrssafHistory({ ...(urssafHistory || {}), [cat]: hist });
  };
  const [addingTva, setAddingTva] = React.useState(false);
  const [newTvaValue, setNewTvaValue] = React.useState("");
  return (
    <div className="scrim" onMouseDown={(e) => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-h">
          <h3>Profil &amp; paramètres</h3>
          <button className="x" onClick={onClose}>✕</button>
        </div>
        <div className="modal-b">
          <div className="field">
            <label>Nom du micro-entrepreneur</label>
            <input className="in" value={profile.nom} placeholder="Ex : Camille Martin" onChange={(e) => up("nom", e.target.value)} />
          </div>
          <div className="toggle-row">
            <div className="t-lab">Assujetti à la TVA<small>Affiche la colonne TVA et le suivi de TVA à reverser</small></div>
            <button className={"sw" + (profile.tva ? " on" : "")} onClick={() => up("tva", !profile.tva)}></button>
          </div>
          <div className="toggle-row">
            <div className="t-lab">Versement libératoire de l'impôt<small>Ajoute le taux libératoire aux cotisations URSSAF</small></div>
            <button className={"sw" + (profile.liberatoire ? " on" : "")} onClick={() => up("liberatoire", !profile.liberatoire)}></button>
          </div>
          <div className="toggle-row">
            <div className="t-lab">Année en cours<small>Données saisies pour {YEAR}</small></div>
            <b>{YEAR}</b>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Dates de prélèvement
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div className="field" style={{ marginBottom: 0 }}>
                <label>TVA</label>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>le</span>
                  <input className="in" type="number" min="1" max="28" style={{ maxWidth: 80 }}
                    value={profile.tvaJour === undefined ? 15 : profile.tvaJour} onChange={(e) => up("tvaJour", num(e.target.value) || "")} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>du mois +</span>
                  <input className="in" type="number" min="0" max="6" style={{ maxWidth: 70 }}
                    value={profile.tvaDecalage === undefined ? 1 : profile.tvaDecalage} onChange={(e) => up("tvaDecalage", e.target.value === "" ? "" : num(e.target.value))} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>mois</span>
                </div>
                <small style={{ color: "var(--faint)", display: "block", marginTop: 4 }}>Par défaut : le 15 du mois suivant (+1).</small>
              </div>
              <div className="field" style={{ marginBottom: 0 }}>
                <label>URSSAF</label>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>le</span>
                  <input className="in" type="number" min="1" max="28" style={{ maxWidth: 80 }}
                    value={profile.urssafJour === undefined ? 5 : profile.urssafJour} onChange={(e) => up("urssafJour", num(e.target.value) || "")} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>du mois +</span>
                  <input className="in" type="number" min="0" max="6" style={{ maxWidth: 70 }}
                    value={profile.urssafDecalage === undefined ? 2 : profile.urssafDecalage} onChange={(e) => up("urssafDecalage", e.target.value === "" ? "" : num(e.target.value))} />
                  <span style={{ fontSize: 13, color: "var(--soft)" }}>mois</span>
                </div>
                <small style={{ color: "var(--faint)", display: "block", marginTop: 4 }}>Par défaut : le 5, 2 mois après (+2).</small>
              </div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14, marginTop: 4 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Référence année précédente ({YEAR - 1})
            </div>
            <p style={{ fontSize: 12, color: "var(--faint)", margin: "-4px 0 12px" }}>
              Tu saisis ces totaux à la main (l'app n'avait pas tes factures cette année-là). Ils servent de repère dans le graphe « Années » et pour l'impôt sur le revenu.
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div className="field">
                <label>CA encaissé TTC {YEAR - 1} <span style={{ fontWeight: 400, color: "var(--faint)" }}>— total encaissé, TVA comprise. Barre de cette année dans le graphe « Années ».</span></label>
                <input className="in" type="number" step="1" placeholder="Ex : 71400" value={prev.caTTC || ""} onChange={e => upPrev("caTTC", e.target.value)} />
              </div>
              <div className="field">
                <label>CA HT {YEAR - 1} <span style={{ fontWeight: 400, color: "var(--faint)" }}>— chiffre d'affaires hors taxes. Pour l'impôt sur le revenu et la barre en mode HT.</span></label>
                <input className="in" type="number" step="1" placeholder="Ex : 59500" value={prev.caHT || ""} onChange={e => upPrev("caHT", e.target.value)} />
              </div>
            </div>
          </div>
          <div style={{ borderTop: "1px solid var(--line)", paddingTop: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".05em", textTransform: "uppercase", color: "var(--faint)", marginBottom: 12 }}>
              Taux officiels
            </div>

            <div style={{ marginBottom: 16 }}>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 8 }}>URSSAF · cotisations sociales</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                {CATS_META.map(m => {
                  const r = currentRateFor(m.key);
                  return r ? (
                    <div key={m.key} style={{ display: "flex", gap: 10, fontSize: 13, alignItems: "center" }}>
                      <span style={{ flex: 1, color: "var(--soft)" }}>{m.label}</span>
                      <span style={{ fontWeight: 600 }}>{pct(r.social)}</span>
                      {r.lib > 0 && <span style={{ color: "var(--faint)" }}>+ {pct(r.lib)} libér.</span>}
                      <span style={{ fontSize: 11, color: "var(--faint)" }}>depuis {new Date(r.from + "T00:00:00").toLocaleDateString("fr-FR")}</span>
                    </div>
                  ) : null;
                })}
              </div>

              {!addingUrssaf ? (
                <button className="btn" style={{ marginTop: 10, fontSize: 12.5 }} onClick={() => setAddingUrssaf(true)}>
                  + Nouveau taux
                </button>
              ) : (
                <div style={{ marginTop: 10, background: "var(--primary-soft)", borderRadius: 8, padding: 12 }}>
                  <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 12, fontWeight: 600, display: "block", marginBottom: 4 }}>À partir du</label>
                    <input type="date" className="in" value={urssafForm.from}
                      onChange={e => setUrssafForm(f => ({ ...f, from: e.target.value }))}
                      style={{ width: "auto" }} />
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 120px 120px", gap: "4px 10px", fontSize: 12, marginBottom: 8 }}>
                    <span style={{ fontWeight: 600, color: "var(--faint)", paddingBottom: 4 }}>Catégorie</span>
                    <span style={{ fontWeight: 600, color: "var(--faint)", textAlign: "right", paddingBottom: 4 }}>Taux social</span>
                    <span style={{ fontWeight: 600, color: "var(--faint)", textAlign: "right", paddingBottom: 4 }}>Taux libér.</span>
                    {CATS_META.map(m => (
                      <React.Fragment key={m.key}>
                        <span style={{ color: "var(--soft)", alignSelf: "center", paddingBottom: 4 }}>{m.label}</span>
                        <div style={{ display: "flex", alignItems: "center", gap: 3, justifyContent: "flex-end", paddingBottom: 4 }}>
                          <input type="number" step="0.1" min="0" max="100" className="in"
                            placeholder={((currentRateFor(m.key)?.social || 0) * 100).toFixed(1)}
                            value={urssafForm.rates[m.key].social}
                            onChange={e => setUrssafForm(f => ({ ...f, rates: { ...f.rates, [m.key]: { ...f.rates[m.key], social: e.target.value } } }))}
                            style={{ width: 64, textAlign: "right" }} />
                          <span style={{ fontSize: 11, color: "var(--faint)" }}>%</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 3, justifyContent: "flex-end", paddingBottom: 4 }}>
                          <input type="number" step="0.1" min="0" max="100" className="in"
                            placeholder={((currentRateFor(m.key)?.lib || 0) * 100).toFixed(1)}
                            value={urssafForm.rates[m.key].lib}
                            onChange={e => setUrssafForm(f => ({ ...f, rates: { ...f.rates, [m.key]: { ...f.rates[m.key], lib: e.target.value } } }))}
                            style={{ width: 64, textAlign: "right" }} />
                          <span style={{ fontSize: 11, color: "var(--faint)" }}>%</span>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button className="btn" onClick={() => setAddingUrssaf(false)}>Annuler</button>
                    <button className="btn pri" onClick={saveUrssafEntry}>Enregistrer</button>
                  </div>
                </div>
              )}

              {Object.values(urssafHistory || {}).some(h => h.length > 1) && (
                <button onClick={() => setShowUrssafHistory(v => !v)}
                  style={{ background: "none", border: "none", cursor: "pointer", fontSize: 11.5, color: "var(--faint)", marginTop: 6, padding: 0 }}>
                  {showUrssafHistory ? "Masquer l'historique" : "Voir l'historique complet"}
                </button>
              )}
              {showUrssafHistory && (
                <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 8 }}>
                  {CATS_META.map(m => {
                    const hist = ((urssafHistory || {})[m.key] || []).slice().sort((a, b) => a.from < b.from ? -1 : 1);
                    if (hist.length <= 1) return null;
                    return (
                      <div key={m.key}>
                        <div style={{ fontWeight: 600, fontSize: 12, marginBottom: 3 }}>{m.label}</div>
                        {hist.map(e => (
                          <div key={e.from} style={{ display: "flex", gap: 8, fontSize: 12, color: "var(--soft)", paddingLeft: 8, alignItems: "center", marginBottom: 2 }}>
                            <span style={{ color: "var(--faint)" }}>depuis {new Date(e.from + "T00:00:00").toLocaleDateString("fr-FR")}</span>
                            <span>{pct(e.social)}</span>
                            {e.lib > 0 && <span style={{ color: "var(--faint)" }}>{pct(e.lib)} libér.</span>}
                            <button onClick={() => deleteUrssafEntry(m.key, e.from)}
                              style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: "var(--faint)", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>✕</button>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            <div>
              <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 8 }}>TVA · taux disponibles</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                {(tvaConfig || []).map(tv => (
                  <span key={tv.v} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "var(--line)", borderRadius: 999, padding: "4px 10px", fontSize: 13 }}>
                    {tv.label}
                    {(tvaConfig || []).length > 1 && (
                      <button onClick={() => setTvaConfig((tvaConfig || []).filter(t => t.v !== tv.v))}
                        style={{ background: "none", border: "none", cursor: "pointer", color: "var(--faint)", padding: 0, lineHeight: 1, fontSize: 13 }}>✕</button>
                    )}
                  </span>
                ))}
                {!addingTva ? (
                  <button className="btn" style={{ fontSize: 12.5, padding: "4px 10px" }} onClick={() => setAddingTva(true)}>+ Ajouter</button>
                ) : (
                  <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
                    <input type="number" step="0.1" min="0" max="100" className="in" placeholder="Ex : 5.5"
                      value={newTvaValue} onChange={e => setNewTvaValue(e.target.value)}
                      style={{ width: 70 }} />
                    <span style={{ fontSize: 12, color: "var(--soft)" }}>%</span>
                    <button className="btn pri" style={{ padding: "4px 10px", fontSize: 12.5 }} onClick={() => {
                      const v = parseFloat(newTvaValue) / 100;
                      if (!isNaN(v) && v >= 0 && !(tvaConfig || []).find(t => t.v === v)) {
                        const label = parseFloat(newTvaValue).toLocaleString("fr-FR") + " %";
                        setTvaConfig([...(tvaConfig || []), { v, label }].sort((a, b) => a.v - b.v));
                      }
                      setNewTvaValue(""); setAddingTva(false);
                    }}>OK</button>
                    <button className="btn" style={{ padding: "4px 10px", fontSize: 12.5 }} onClick={() => { setAddingTva(false); setNewTvaValue(""); }}>Annuler</button>
                  </span>
                )}
              </div>
            </div>
          </div>

          <div className="hint">
            Toutes vos données sont enregistrées automatiquement dans ce navigateur.
            Exportez un fichier JSON pour les sauvegarder ou les transférer sur un autre appareil.
          </div>
        </div>
        <div className="modal-f">
          <button className="btn" onClick={onExport}>
            <svg viewBox="0 0 24 24"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>
            Exporter JSON
          </button>
          <button className="btn" onClick={() => fileRef.current.click()}>
            <svg viewBox="0 0 24 24"><path d="M12 21V9M8 13l4-4 4 4M5 3h14"/></svg>
            Importer JSON
          </button>
          <input ref={fileRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={onImport} />
          <button className="btn pri" style={{ marginLeft: "auto" }} onClick={onClose}>Terminé</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
